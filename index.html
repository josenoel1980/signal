<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMI-ACP® Ultimate Study Guide 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy2: #0d1f3c;
  --blue: #1a56db;
  --blue2: #2563eb;
  --accent: #00c9a7;
  --accent2: #06d6a0;
  --gold: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --sidebar-w: 290px;
  --bg: #f0f4ff;
  --surface: #ffffff;
  --text: #0f172a;
  --text2: #475569;
  --border: #e2e8f0;
  --highlight: #fff3cd;
  --code-bg: #1e293b;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(10,22,40,0.10);
  --shadow2: 0 2px 8px rgba(10,22,40,0.07);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 15px;
}

/* ── LAYOUT ────────────────────────────────────────────── */
#app { display: flex; min-height: 100vh; }

/* ── SIDEBAR ───────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--navy);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
  transition: width 0.3s ease, min-width 0.3s ease;
  z-index: 100;
}
#sidebar.collapsed { width: 56px; min-width: 56px; }
#sidebar.collapsed .sidebar-label,
#sidebar.collapsed .section-items,
#sidebar.collapsed #search-box,
#sidebar.collapsed .sidebar-logo-text { display: none; }
#sidebar.collapsed .section-header { justify-content: center; padding: 10px 0; }
#sidebar.collapsed .section-icon { margin: 0; }

.sidebar-top {
  padding: 20px 16px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.sidebar-badge {
  background: linear-gradient(135deg, var(--accent), var(--blue));
  color: white;
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 13px;
  padding: 5px 10px;
  border-radius: 6px;
  white-space: nowrap;
}
.sidebar-logo-text {
  color: rgba(255,255,255,0.55);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Search */
.search-wrap {
  position: relative;
}
#search-box {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 8px 12px 8px 34px;
  color: white;
  font-size: 13px;
  font-family: 'Sora', sans-serif;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
#search-box::placeholder { color: rgba(255,255,255,0.35); }
#search-box:focus {
  border-color: var(--accent);
  background: rgba(255,255,255,0.10);
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  pointer-events: none;
}
#search-results-count {
  font-size: 10px;
  color: var(--accent);
  margin-top: 5px;
  padding-left: 2px;
  min-height: 14px;
}

/* Nav */
#sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 20px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
#sidebar-nav::-webkit-scrollbar { width: 4px; }
#sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.nav-section { margin-bottom: 2px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 16px;
  cursor: pointer;
  color: rgba(255,255,255,0.8);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
  transition: background 0.15s, color 0.15s;
  user-select: none;
  border-left: 3px solid transparent;
}
.section-header:hover { background: rgba(255,255,255,0.06); color: white; }
.section-header.active { background: rgba(0,201,167,0.12); color: var(--accent); border-left-color: var(--accent); }
.section-icon {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}
.section-label { flex: 1; }
.chevron {
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  transition: transform 0.2s;
}
.section-header.open .chevron { transform: rotate(90deg); }

.section-items {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}
.section-items.open { max-height: 1000px; }
.nav-item {
  display: block;
  padding: 6px 16px 6px 47px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  text-decoration: none;
  border-left: 3px solid transparent;
  margin-left: 0;
}
.nav-item:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.04); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,201,167,0.07); }

/* Toggle btn */
#toggle-sidebar {
  position: fixed;
  left: calc(var(--sidebar-w) - 14px);
  top: 22px;
  width: 28px;
  height: 28px;
  background: var(--navy2);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 200;
  color: rgba(255,255,255,0.6);
  font-size: 11px;
  transition: left 0.3s ease, background 0.2s;
}
#toggle-sidebar:hover { background: var(--navy); color: white; }
body.sidebar-collapsed #toggle-sidebar { left: 42px; }

/* ── MAIN ──────────────────────────────────────────────── */
#main {
  flex: 1;
  overflow-y: auto;
  min-width: 0;
}

/* Top bar */
#topbar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 14px 40px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow2);
}
.topbar-title {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  flex: 1;
}
.topbar-badge {
  background: linear-gradient(135deg, var(--accent), var(--blue2));
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text2);
}
.progress-bar-outer {
  width: 120px;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--blue2));
  border-radius: 4px;
  transition: width 0.4s ease;
  width: 0%;
}

/* Content area */
#content {
  padding: 40px 48px 80px;
  max-width: 960px;
}

/* Search highlight */
.search-highlight {
  background: #fef08a;
  border-radius: 3px;
  padding: 0 2px;
}

/* ── CONTENT STYLES ────────────────────────────────────── */
.page-section { display: none; }
.page-section.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 60%, #0f2f5a 100%);
  border-radius: 16px;
  padding: 36px 40px;
  margin-bottom: 36px;
  position: relative;
  overflow: hidden;
}
.section-hero::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(0,201,167,0.15) 0%, transparent 70%);
}
.hero-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.hero-title {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 700;
  color: white;
  line-height: 1.2;
  margin-bottom: 12px;
}
.hero-subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  max-width: 600px;
  line-height: 1.6;
}
.hero-stats {
  display: flex;
  gap: 24px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.hero-stat {
  text-align: center;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px 20px;
  min-width: 90px;
}
.hero-stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
  display: block;
}
.hero-stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
}

h2.content-h2 {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  margin: 36px 0 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
h2.content-h2::before {
  content: '';
  width: 4px;
  height: 22px;
  background: linear-gradient(to bottom, var(--accent), var(--blue2));
  border-radius: 2px;
  flex-shrink: 0;
}
h3.content-h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--blue2);
  margin: 24px 0 10px;
}
h4.content-h4 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin: 18px 0 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text2);
}

p.content-p {
  color: var(--text2);
  margin-bottom: 14px;
  font-size: 14.5px;
  line-height: 1.8;
}

/* Callout boxes */
.callout {
  border-radius: 10px;
  padding: 18px 22px;
  margin: 18px 0;
  border-left: 4px solid;
}
.callout-blue { background: #eff6ff; border-color: var(--blue2); }
.callout-green { background: #f0fdf4; border-color: #16a34a; }
.callout-amber { background: #fffbeb; border-color: var(--gold); }
.callout-red { background: #fef2f2; border-color: var(--red); }
.callout-purple { background: #faf5ff; border-color: var(--purple); }
.callout-navy { background: #f0f4ff; border-color: var(--navy); }
.callout-title {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}
.callout-blue .callout-title { color: var(--blue2); }
.callout-green .callout-title { color: #16a34a; }
.callout-amber .callout-title { color: #92400e; }
.callout-red .callout-title { color: var(--red); }
.callout-purple .callout-title { color: var(--purple); }
.callout-navy .callout-title { color: var(--navy); }
.callout ul { padding-left: 18px; }
.callout li { font-size: 13.5px; color: var(--text); margin-bottom: 5px; line-height: 1.6; }

/* Tables */
.content-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 13.5px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow2);
}
.content-table th {
  background: var(--navy);
  color: white;
  padding: 11px 14px;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.content-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
  line-height: 1.6;
}
.content-table tr:last-child td { border-bottom: none; }
.content-table tr:nth-child(even) td { background: #f8faff; }
.content-table tr:hover td { background: #f0f4ff; }
td strong { color: var(--navy); font-weight: 600; }

/* Value cards */
.value-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 18px 0;
}
.value-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.value-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(to bottom, var(--accent), var(--blue2));
}
.value-card-over {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.value-card-left {
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.value-card-right {
  font-size: 12.5px;
  color: var(--text2);
}

/* Principles list */
.principle-item {
  display: flex;
  gap: 14px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 13px 16px;
  margin-bottom: 8px;
  transition: box-shadow 0.15s;
}
.principle-item:hover { box-shadow: var(--shadow2); }
.principle-num {
  width: 26px;
  height: 26px;
  background: linear-gradient(135deg, var(--accent), var(--blue2));
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.principle-text { font-size: 13.5px; color: var(--text); line-height: 1.6; }
.principle-note { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 3px; }

/* Q&A blocks */
.qa-block {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: var(--shadow2);
}
.qa-question {
  padding: 14px 18px;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  cursor: pointer;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: white;
  transition: background 0.15s;
  border-bottom: 1px solid transparent;
}
.qa-question:hover { background: #f8faff; }
.qa-question.open { background: #f0f4ff; border-bottom-color: var(--border); }
.qa-qnum {
  width: 28px;
  height: 28px;
  background: var(--navy);
  color: white;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}
.qa-qtxt { flex: 1; line-height: 1.55; }
.qa-toggle { color: var(--text2); font-size: 12px; flex-shrink: 0; margin-top: 3px; transition: transform 0.2s; }
.qa-question.open .qa-toggle { transform: rotate(180deg); }
.qa-body { display: none; padding: 16px 18px; }
.qa-body.open { display: block; animation: fadeIn 0.2s ease; }
.qa-options { list-style: none; margin-bottom: 14px; }
.qa-option {
  padding: 9px 13px;
  border-radius: 7px;
  margin-bottom: 6px;
  font-size: 13.5px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: background 0.15s, border-color 0.15s;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.qa-option:hover { background: #f8faff; border-color: var(--blue2); }
.qa-option.correct { background: #f0fdf4; border-color: #16a34a; }
.qa-option.incorrect { background: #fef2f2; border-color: var(--red); }
.qa-option-letter {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--text2);
}
.qa-option.correct .qa-option-letter { background: #16a34a; color: white; }
.qa-option.incorrect .qa-option-letter { background: var(--red); color: white; }
.qa-answer {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 8px;
  padding: 13px 16px;
  font-size: 13.5px;
  color: #14532d;
  margin-top: 6px;
}
.qa-answer strong { color: #16a34a; }

/* Domain cards */
.domain-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 18px 0;
}
.domain-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.domain-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.domain-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 4px;
}
.domain-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--navy);
  margin-bottom: 6px;
}
.domain-desc { font-size: 12.5px; color: var(--text2); line-height: 1.55; }
.domain-bar {
  height: 4px;
  border-radius: 4px;
  margin-top: 12px;
  background: var(--border);
  overflow: hidden;
}
.domain-bar-fill { height: 100%; border-radius: 4px; }

/* Tuckman stages */
.tuckman-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin: 18px 0;
}
.tuckman-card {
  border-radius: 10px;
  padding: 16px 12px;
  text-align: center;
}
.tuckman-stage {
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.tuckman-desc { font-size: 11.5px; line-height: 1.5; margin-bottom: 8px; }
.tuckman-leader { font-size: 11px; font-weight: 600; font-style: italic; }

/* Framework cards */
.framework-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin: 18px 0;
}
.framework-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  transition: box-shadow 0.15s;
}
.framework-card:hover { box-shadow: var(--shadow); }
.fw-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-bottom: 10px;
}
.fw-name { font-weight: 700; font-size: 14px; color: var(--navy); margin-bottom: 4px; }
.fw-tagline { font-size: 11.5px; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
.fw-desc { font-size: 12px; color: var(--text2); line-height: 1.55; }

/* Formula cards */
.formula-card {
  background: var(--code-bg);
  border-radius: 10px;
  padding: 18px 22px;
  margin: 12px 0;
  border-left: 3px solid var(--accent);
}
.formula-name { color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.formula-expr {
  font-family: 'JetBrains Mono', monospace;
  color: #e2e8f0;
  font-size: 15px;
  margin-bottom: 6px;
}
.formula-note { color: #94a3b8; font-size: 12.5px; line-height: 1.6; }

/* Tips list */
.tip-list { list-style: none; margin: 12px 0; }
.tip-item {
  display: flex;
  gap: 12px;
  padding: 9px 14px;
  border-radius: 7px;
  margin-bottom: 6px;
  font-size: 13.5px;
  align-items: flex-start;
}
.tip-item:nth-child(odd) { background: white; border: 1px solid var(--border); }
.tip-item:nth-child(even) { background: #f8faff; border: 1px solid #e8eeff; }
.tip-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.tip-text { color: var(--text); line-height: 1.6; }

/* Metric cards grid */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 18px 0;
}
.metric-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.metric-name { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.metric-formula {
  font-family: 'JetBrains Mono', monospace;

/* Search overlay */
#search-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,22,40,0.7);
  z-index: 1000;
  align-items: flex-start;
  justify-content: center;
  padding-top: 80px;
}
#search-overlay.active { display: flex; }
.search-modal {
  background: white;
  border-radius: 14px;
  width: 680px;
  max-width: 92vw;
  box-shadow: 0 24px 80px rgba(0,0,0,0.3);
  overflow: hidden;
}
.search-modal-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
#search-modal-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 16px;
  font-family: 'Sora', sans-serif;
  color: var(--text);
}
#search-modal-input::placeholder { color: #94a3b8; }
.search-modal-kbd {
  font-size: 11px;
  color: var(--text2);
  background: var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  cursor: pointer;
}
#search-modal-results {
  max-height: 420px;
  overflow-y: auto;
  padding: 8px;
}
.search-result-item {
  padding: 12px 14px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 4px;
  transition: background 0.12s;
}
.search-result-item:hover, .search-result-item.focused { background: #f0f4ff; }
.search-result-section { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.search-result-title { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
.search-result-preview { font-size: 12.5px; color: var(--text2); line-height: 1.5; }
.search-result-preview mark { background: #fef08a; border-radius: 2px; padding: 0 2px; }
.no-results { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }

/* Cheat sheet compact */
.cheatsheet-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 14px 0;
}
.cs-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.cs-card-head {
  background: var(--navy);
  color: white;
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.cs-card-body { padding: 12px 14px; }
.cs-item {
  display: flex;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 12.5px;
  align-items: baseline;
}
.cs-item:last-child { border-bottom: none; }
.cs-key { font-weight: 700; color: var(--navy); min-width: 80px; flex-shrink: 0; }
.cs-val { color: var(--text2); line-height: 1.5; }

/* Acronym table search */
#acronym-search {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 14px;
  font-family: 'Sora', sans-serif;
  outline: none;
  transition: border-color 0.2s;

#acronym-search:focus { border-color: var(--accent); }

@media (max-width: 900px) {

function callout(type, title, items) {
  return `<div class="callout callout-${type}">
    <div class="callout-title">${title}</div>
    <ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>
  </div>`;
}

function table(headers, rows) {
  return `<table class="content-table">
    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(row => `<tr>${row.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;
}

function qaBlock(num, question, options, answer, explanation) {
  const letters = ['A','B','C','D'];
  return `<div class="qa-block" data-qa="${num}">
    <div class="qa-question" onclick="toggleQA(${num})">
      <div class="qa-qnum">Q${num}</div>
      <div class="qa-qtxt">${question}</div>
      <div class="qa-toggle">▼</div>
    </div>
    <div class="qa-body" id="qa-body-${num}">
      <ul class="qa-options">
        ${options.map((opt, i) => `<li class="qa-option" onclick="selectOpt(this,${num},'${letters[i]}','${answer}')" data-letter="${letters[i]}">
          <span class="qa-option-letter">${letters[i]}</span>
          <span>${opt}</span>
        </li>`).join('')}
      </ul>
      <div class="qa-answer" id="qa-ans-${num}" style="display:none">
        <strong>✔ Answer: ${answer}</strong> — ${explanation}
      </div>
    </div>
  </div>`;
}

  <p class="content-p">Empirical process control is the foundation upon which Scrum and all major agile frameworks are built. The core idea: in complex environments, you cannot predict outcomes with certainty. Instead, you <strong>observe</strong> what is actually happening, <strong>inspect</strong> it frequently, and <strong>adapt</strong> based on real data — not assumptions or plans made before the work began.</p>

  <table class="content-table"><thead><tr><th>Task</th><th>Official Enablers — Nov 2024 ECO</th></tr></thead><tbody><tr><td><strong>Task 1: Experiment Early</strong></td><td>Build an increment of the product to validate solution and/or market need. Create an environment to innovate, learn, and grow.</td></tr><tr><td><strong>Task 2: Embrace Agile Mindset</strong></td><td>Use agile values and principles. Apply complexity methods (CAS, Stacey Matrix, Cynefin) to classify scenarios. Identify importance/risks of each complexity theory. Interpret agile suitability tool outputs. Integrate agile models based on needs (use case, team, project, organization).</td></tr><tr><td><strong>Task 3: Promote Collaborative Team Environment</strong></td><td>Establish team vision and working agreements. Form and develop high-performing teams. Use retrospective findings to improve the team. Use collaboration practices to break down silos. Commit to team decisions even in disagreement. Evaluate team agile understanding to tailor approach. Identify factors for inter-team coordination (Scrum of Scrums, team of teams).</td></tr><tr><td><strong>Task 4: Build Transparency</strong></td><td>Make status, progress, process, risks, impediments, and learning accessible to all (information radiators). Establish a feedback loop for the team. Define communication strategies for co-located and distributed teams.</td></tr><tr><td><strong>Task 5: Foster Psychological Safety</strong></td><td>Promote a no-blame culture by encouraging objectivity. Encourage dialogue over debate. Solicit and provide constructive feedback, act on it. Encourage challenging the status quo.</td></tr><tr><td><strong>Task 6: Shorten Feedback Loops</strong></td><td>Include stakeholders from day one. Maximize value given a specific timeframe. Use tools and techniques to shorten feedback (design thinking, lean startup).</td></tr><tr><td><strong>Task 7: Embrace Change</strong></td><td>Promote a growth mindset to respond to change. Embrace process adaptation by responding to changing requirements and priorities. Encourage and model cross-skills / generalizing specialists. Adapt to product needs based on learning and feedback.</td></tr></tbody></table>
  <div class="callout callout-navy"><div class="callout-title">🔑 Domain 1 Complexity Frameworks — Official ECO Task 2</div><ul><li><strong>Cynefin (Dave Snowden):</strong> Simple, Complicated, Complex, Chaotic, Disorder. Software = Complex. Cause-effect only known in retrospect. Agile is the empirical response to complexity.</li><li><strong>Stacey Matrix:</strong> Requirements certainty (x) vs. Technology certainty (y). High uncertainty on both axes = Complex = use agile. Both certain = Simple = use waterfall.</li><li><strong>CAS (Complex Adaptive Systems):</strong> Systems of many interacting agents that self-organize. Teams are CAS. You influence the environment; you do not fully control outcomes.</li><li><strong>Generalizing Specialists (T-shaped):</strong> Deep expertise in one area + broad capability in adjacent areas. ECO explicitly lists 'cross-skills' in Task 7. Reduces single points of failure.</li><li><strong>Design Thinking + Lean Startup:</strong> Both explicitly named in ECO Task 6 as feedback-loop shortening tools. Design Thinking: Empathize-Define-Ideate-Prototype-Test. Lean Startup: Build-Measure-Learn.</li></ul></div>

  <h2 class="content-h2" id="servant-leadership">Servant Leadership — Complete Guide</h2>
  <p class="content-p">Traditional project managers plan, direct, and control. They hold authority and use it to drive results. Agile leaders invert this model: they <em>serve</em> the team. Robert K. Greenleaf coined "servant leadership" in his 1970 essay "The Servant as Leader," arguing that the most effective leaders first ask "How can I serve?" rather than "How can I lead?"</p>
  <p class="content-p">In agile, servant leadership manifests through the Scrum Master role, agile coaches, and effective Product Owners. It is the reason the Scrum Master has <em>no authority</em> over the team's technical decisions — their power comes from influence, facilitation, and removing obstacles, not from hierarchy.</p>

  ${table(['Servant Leadership Characteristic', 'How It Shows Up in Agile', 'Contrasted With Traditional Leadership'], [
    ['<strong>Listen first</strong> — seek to understand before responding', 'SM listens fully to team concerns before suggesting solutions. Asks "what do you need?" before offering advice.', 'Manager hears the problem then immediately tells the team what to do'],

    ['<strong>Persuasion</strong> — convince through logic and vision, not authority', 'SM explains the value of the retrospective format change with data from past retros, inviting the team to decide', 'Manager mandates a new process without explanation; team complies but doesn\'t buy in'],

  <h2 class="content-h2" id="tuckman">Tuckman\'s Team Development Model — Full Deep Dive</h2>
  <p class="content-p">Bruce Tuckman published his model in 1965, initially with four stages. He added "Adjourning" in 1977. The model describes the psychological stages a group goes through when working together on a shared goal. It is one of the most frequently tested models on the PMI-ACP exam.</p>
  <p class="content-p"><strong>Critical exam insight:</strong> The exam doesn't just test that you know the stage names. It tests what the LEADER should DO at each stage, and what behaviors signal each stage. Often a question describes team behavior without naming the stage — you must diagnose the stage from the clues and choose the appropriate leader action.</p>

  <div class="tuckman-grid">
    <div class="tuckman-card" style="background:#eff6ff;border:1px solid #bfdbfe">

      <div class="tuckman-leader" style="color:#1d4ed8">Leader: DIRECT — provide structure, clarify roles and goals</div>
    </div>
    <div class="tuckman-card" style="background:#fef2f2;border:1px solid #fecaca">
      <div class="tuckman-stage" style="color:#dc2626">Storming</div>
      <div class="tuckman-desc">Conflict, power struggles, questioning leadership, personality clashes, frustration with process</div>

    </div>

  <h3 class="content-h3">Tuckman Stage Recognition — Exam Clues</h3>
  ${table(['Stage', 'Behavioral Clues in Question Scenarios', 'Common Exam Traps'], [

  <h2 class="content-h2" id="conflict">Conflict Management — Complete Guide</h2>
  <p class="content-p">Conflict is inevitable in agile teams — and that's actually healthy. Diversity of thought, passion for quality, and competing priorities naturally create tension. The leader's job is not to eliminate conflict but to ensure it is productive rather than destructive. The PMI-ACP specifically tests the Speed Leas conflict model and the Thomas-Kilmann conflict resolution strategies.</p>

  <h3 class="content-h3">Speed Leas Conflict Levels</h3>
  <p class="content-p">Sam Kaner and Speed Leas identified five escalating levels of conflict. The key insight: the appropriate intervention depends on the level. What works at Level 1 may be completely ineffective at Level 4.</p>
  ${table(['Level', 'Name', 'Behavioral Signs', 'Leader Response'], [
    ['1', 'Problem to Solve', 'Rational discussion. Team focuses on data and problem resolution. Disagreement is content-focused, not personal.', 'Facilitate collaborative problem-solving. Team can largely handle this level themselves with light facilitation.'],
    ['2', 'Disagreement', 'Cynical language begins: "I guess we\'ll have to save them again." Personal distancing. People are protecting themselves. Conversations become more careful.', 'Coach individuals separately first. Reframe conversations around shared goals. Active listening and empathy. Help parties see each other\'s perspectives.'],
    ['3', 'Contest', 'Win/lose mentality emerges. "I\'m right, they\'re wrong." Personal attacks begin. Factions forming within the team. Mission shifts from solving the problem to winning.', 'Active mediation required. Bring parties together with structured facilitation. Identify common ground. Focus on interests (why they want something) not positions (what they say they want).'],
    ['4', 'Crusade', 'Entrenched camps. Coalition building — people are recruited to take sides. Mission is now to defeat the other side. Ideology replaces problem-solving.', 'External facilitator required. Leadership intervention beyond the SM level. May need organizational mediation. Focus on keeping the team functional.'],
    ['5', 'World War', 'Complete polarization. The goal is now destruction — ending the relationship or removing people from the team. No possibility of self-correction.', 'Organizational intervention mandatory. May require team restructuring, personnel changes, or project cancellation. SM cannot resolve this level alone.'],
  ])}

  <h3 class="content-h3">Thomas-Kilmann Conflict Resolution Strategies</h3>
  ${table(['Strategy', 'Assertiveness', 'Cooperativeness', 'When to Use', 'Outcome'], [

    ['<strong>Compromising</strong>', 'Medium', 'Medium', 'When both concerns are important but time is limited. Temporary solutions needed.', 'Partial Win / Partial Win — acceptable short-term'],
    ['<strong>Accommodating / Smoothing</strong>', 'Low', 'High', 'When the relationship is more important than the issue. Other party\'s need is greater.', 'Lose-Win — preserves relationship at cost of outcome'],
    ['<strong>Competing / Forcing</strong>', 'High', 'Low', 'Emergency decisions, safety issues, when you know you\'re right and time is critical.', 'Win-Lose — damages relationship. Use sparingly.'],

  <h2 class="content-h2" id="coaching">Coaching, Mentoring & Emotional Intelligence</h2>
  <h3 class="content-h3">Coaching vs. Mentoring — Know the Difference</h3>
  <p class="content-p">This distinction is frequently tested. Many candidates confuse the two, especially since both involve one person supporting another's development. The key difference is in direction: coaching draws answers out; mentoring pours answers in.</p>
  ${table(['Dimension', 'Coaching', 'Mentoring'], [
    ['Direction', 'Non-directive: asks questions to help the person discover their own answers', 'Directive: shares experience, advice, and knowledge directly'],
    ['Assumption', 'The coachee has the answers within them — they just need help finding them', 'The mentee lacks specific knowledge that the mentor can transfer'],
    ['Sample question/statement', '"What do you think the root cause of this issue might be?"', '"When I faced this situation, here\'s what worked for me..."'],
    ['Goal', 'Develop independent thinking and problem-solving capability', 'Transfer knowledge, skills, or experience from mentor to mentee'],

  ])}

  <h3 class="content-h3">Daniel Goleman\'s 5 Components of Emotional Intelligence (EQ)</h3>
  <p class="content-p">Research consistently shows that high-EQ leaders build stronger, more resilient teams. In agile contexts, emotional intelligence directly impacts psychological safety, retrospective effectiveness, and conflict resolution. The PMI-ACP tests EQ awareness.</p>
  ${table(['EQ Component', 'Definition', 'Low EQ Example', 'High EQ Example in Agile'], [
    ['<strong>Self-Awareness</strong>', 'Understanding your own emotions, strengths, weaknesses, and their impact on others', 'Leader becomes visibly frustrated when their technical suggestions are challenged, without realizing the impact on team openness', 'Leader recognizes they are frustrated and consciously adopts a curious listening stance before responding'],
    ['<strong>Self-Regulation</strong>', 'Managing disruptive impulses and emotional reactions; thinking before acting', 'After a sprint failure, leader publicly blames specific team members in the retrospective', 'After a sprint failure, leader calmly facilitates a root cause analysis and focuses on systemic improvements'],

  <h2 class="content-h2" id="facilitation">Facilitation Techniques — Expanded</h2>
  <p class="content-p">Facilitation is a core skill for Scrum Masters, agile coaches, and any agile leader. Effective facilitation creates the conditions for groups to think, decide, and commit together — without the facilitator imposing their views on the outcome.</p>

  ${table(['Technique', 'How It Works', 'Best Used For', 'Why It Works'], [
    ['<strong>Fist of Five</strong>', 'Show 1-5 fingers: 5=fully support, 4=minor concerns, 3=can live with it, 2=uncomfortable, 1=strongly oppose', 'Team decisions and working agreements', 'Surfaces the DEGREE of consensus — not just yes/no. A room full of 3s signals the need for more discussion even without an outright "no".'],
    ['<strong>Dot Voting</strong>', 'Each person gets N sticky dots to place on options. Options with most dots = highest priority.', 'Prioritizing retrospective themes, backlog items, decision options', 'Democratic, visual, fast. Prevents the most vocal person from dominating.'],
    ['<strong>Silent Brainstorming (Brainwriting)</strong>', 'Everyone writes ideas independently on sticky notes BEFORE group discussion begins', 'Generating ideas in retrospectives, story brainstorming, risk identification', 'Prevents anchoring (being influenced by the first idea shared) and HiPPO effect (Highest Paid Person\'s Opinion dominates)'],
    ['<strong>1-2-4-All (Liberating Structure)</strong>', 'Reflect alone (1 min) → share in pairs (2 min) → share in groups of 4 (4 min) → share with all', 'Any retrospective or brainstorming activity', 'Ensures every voice is heard before group discussion. Builds confidence in introverted team members.'],
    ['<strong>Parking Lot</strong>', 'Off-topic or time-consuming items are captured on a visible "parking lot" to address after the meeting', 'All meetings', 'Keeps meetings on track without dismissing valid concerns. Items in parking lot are honored and followed up on.'],
    ['<strong>Pre-Mortem</strong>', '"Imagine we are 6 months in the future and the project has failed. What went wrong?" Team backcasts from failure.', 'Sprint 0, PI planning, release planning', 'Surfaces risks and concerns that people are reluctant to raise in forward-looking planning sessions. Makes it safe to be pessimistic.'],
    ['<strong>ORID (Focused Conversation)</strong>', 'Objective (facts: what happened?) → Reflective (feelings: how did it affect you?) → Interpretive (meaning: what does it mean?) → Decisional (action: what will we do?)', 'Retrospectives, incident reviews, project post-mortems', 'Structured progression ensures emotional processing before jumping to solutions. Prevents skipping to action before understanding.'],
    ['<strong>Impact vs. Effort Matrix</strong>', 'Plot improvement ideas on a 2x2 grid: Impact (high/low) vs. Effort (high/low)', 'Prioritizing retrospective action items', 'Quick-wins (high impact, low effort) should be done first. Avoids team spending all their improvement energy on complex, low-impact changes.'],
    ['<strong>World Café</strong>', 'Multiple tables, each discussing a different topic. Participants rotate tables after timed rounds, carrying insights forward.', 'Large team retrospectives, PI retrospectives, all-hands agile workshops', 'Allows many topics to be explored simultaneously while cross-pollinating ideas across groups.'],
  ])}

  <h2 class="content-h2" id="team-dynamics">Team Dynamics, Motivation & Psychological Safety</h2>
  <h3 class="content-h3">Psychological Safety (Amy Edmondson)</h3>
  <p class="content-p">Psychological safety is the belief that one will not be punished or humiliated for speaking up with ideas, questions, concerns, or mistakes. Google's Project Aristotle (2016) found it to be the #1 predictor of high-performing teams — more predictive than intelligence, skills, or any other factor.</p>
  ${table(['Behavior That Builds Safety', 'Behavior That Destroys Safety'], [
    ['Retrospectives where problems are discussed without blame', 'Public humiliation when mistakes are made'],
    ['Leader admits their own mistakes openly', 'Leader responds to bad news with anger or criticism'],
    ['Disagreements debated on merits, not personalities', '"That\'s a stupid idea" responses to suggestions'],
    ['Junior members\' ideas receive equal consideration', 'Only senior voices are acknowledged in meetings'],
    ['Blockers raised immediately without fear', 'Team hides problems until they become crises'],
  ])}

  <h3 class="content-h3">Intrinsic vs. Extrinsic Motivation (Agile Context)</h3>
  <p class="content-p">Daniel Pink's Drive model identifies three intrinsic motivators that are especially relevant for knowledge workers on agile teams:</p>
  ${table(['Motivator', 'Definition', 'How Agile Supports It', 'How to Destroy It'], [
    ['<strong>Autonomy</strong>', 'The desire to direct your own work', 'Self-organizing teams choose HOW to do the work. Team members self-assign tasks.', 'Micromanagement; manager assigns tasks; no team input into process'],
    ['<strong>Mastery</strong>', 'The urge to get better at something that matters', 'Pair programming, code reviews, spikes, and continuous learning opportunities within sprints', 'Always assigning easy tasks; no stretch assignments; no learning time'],

  <h2 class="content-h2" id="systems-thinking">Systems Thinking & Agile Leadership</h2>
  <p class="content-p">Systems thinking means understanding that organizations are complex, interconnected systems where actions in one area produce effects throughout the system — often with delays. Agile leaders who think systemically avoid the trap of local optimization (making one part look better at the expense of the whole).</p>
  ${table(['Systems Thinking Concept', 'Agile Application'], [
    ['<strong>Feedback loops:</strong> Actions cause effects that feed back and influence future actions', 'Short sprint cycles create rapid feedback loops. Retrospectives are a formal adaptation feedback loop. Burndown charts provide daily feedback on sprint health.'],
    ['<strong>Local vs. global optimization:</strong> Optimizing one part of a system can harm the whole', 'A team that maximizes individual velocity but never helps teammates creates bottlenecks elsewhere. A team that rushes features creates technical debt that slows future teams.'],
    ['<strong>Emergent behavior:</strong> System behavior arises from component interactions, not the components themselves', 'A high-performing agile team is more than the sum of its individual members. Team practices, norms, and trust produce emergent capability.'],
    ['<strong>Constraints and Theory of Constraints:</strong> A system is limited by its weakest link', 'Kanban WIP limits surface the constraint (bottleneck). Improving non-constraint stages doesn\'t help throughput. Focus improvement on the actual constraint.'],

  <h2 class="content-h2" id="eco-tasks-d2">Official ECO — Domain 2: Tasks &amp; Enablers (Nov 2024)</h2>
  <p class="content-p">Domain 2 (Leadership, 25% of exam) has 6 official tasks. These are the leadership behaviors the exam directly tests through scenario-based questions.</p>
  <table class="content-table"><thead><tr><th>Task</th><th>Official Enablers — Nov 2024 ECO</th></tr></thead><tbody><tr><td><strong>Task 1: Empower Teams</strong></td><td>Establish environment of trust (transparent communication). Motivate team members to experiment and take risks. Coach and mentor team members. Promote collective ownership of goals. Recognize differences between training, coaching, and mentoring, and when to apply each. Apply emotional intelligence to support team, increase empathy, resolve conflict, support positive influence. Interpret non-verbal cues during team interaction. Interpret self-assessment tool outputs to help teams develop capabilities.</td></tr><tr><td><strong>Task 2: Facilitate Problem Resolution</strong></td><td>Investigate root cause of problems (root cause analysis, Ishikawa/fishbone diagram). Determine resolution strategies with the team that add most value. Ensure problems are resolved in a timely manner.</td></tr><tr><td><strong>Task 3: Promote Knowledge Sharing</strong></td><td>Create environment to capture and share knowledge (Lessons Learned, retrospectives, communities of practice). Leverage organizational knowledge assets (similar initiatives, people, processes). Allocate time for knowledge sharing and making required updates.</td></tr><tr><td><strong>Task 4: Promote Agile Mindset Principles and Practices</strong></td><td>Create awareness around agile values and principles. Foster environment for continuous improvement. Recognize, celebrate, and encourage agile behavior.</td></tr><tr><td><strong>Task 5: Promote Shared Vision and Purpose</strong></td><td>Define and ensure common understanding of purpose and vision with all stakeholders. Ensure product is always aligned to vision and organizational goals. Continuously communicate the vision and purpose.</td></tr><tr><td><strong>Task 6: Facilitate Conflict Management</strong></td><td>Identify the root cause and the level of the conflict. Promote collaborative approach to solve the conflict.</td></tr></tbody></table>
  <div class="callout callout-navy"><div class="callout-title">🔑 Domain 2 Key Exam Points from Official ECO Enablers</div><ul><li><strong>Task 1 — Training vs. Coaching vs. Mentoring:</strong> ECO explicitly tests this. Training = structured curriculum. Coaching = draws answers from coachee (non-directive, builds independence). Mentoring = shares experience/knowledge (directive, transfers expertise).</li><li><strong>Task 1 — Non-verbal cues and EQ:</strong> Explicitly in ECO. Interpreting body language, tone, and energy levels during team interactions is an expected leadership skill. Low energy in retrospective may signal psychological safety issue.</li><li><strong>Task 2 — Ishikawa/Fishbone Diagram:</strong> Named explicitly in ECO. A root cause analysis tool mapping possible causes (People, Process, Tools, Environment) to a central problem. Used in retrospectives and incident analysis.</li><li><strong>Task 3 — Communities of Practice (CoP):</strong> Explicitly named in ECO. Voluntary groups sharing expertise across teams. Knowledge sharing mechanism in large agile organizations and SAFe.</li><li><strong>Task 5 — Vision is continuous, not one-time:</strong> ECO says 'continuously communicate' — not just at kickoff. Every sprint review should reconnect work to the product vision and organizational goals.</li></ul></div>

  <h2 class="content-h2" id="user-stories">User Stories — Complete Guide</h2>
  <p class="content-p">User stories were popularized by XP's Ron Jeffries, who described them as having three aspects: <strong>Card</strong> (a written promise of a conversation), <strong>Conversation</strong> (the actual discussion that fleshes out requirements), and <strong>Confirmation</strong> (the acceptance criteria that confirm the story is done). This is why a user story is not a specification — it is a <em>placeholder for a conversation</em>.</p>
  <p class="content-p">The goal of a user story is to capture the <strong>WHO</strong> (the user type), the <strong>WHAT</strong> (the action or goal), and the <strong>WHY</strong> (the business value). The "so that" clause is critical — it forces the author to articulate the business justification and prevents building features that satisfy stated requirements but miss underlying needs.</p>

  ${callout('blue', '📝 Standard User Story Format (Connextra Template)', [
    '<strong>As a</strong> [specific type of user or persona],',
    '<strong>I want</strong> [some goal, action, or feature],',
    '<strong>So that</strong> [I receive this specific benefit or business value].',
    '',
    'Good example: "As a frequent online shopper, I want to save my payment details securely, so that I can complete checkout in under 30 seconds on future visits."',
    'Bad example: "As a user, I want the system to be improved." (too vague, no clear value)',
    'Bad example: "The database must use PostgreSQL." (implementation detail, not a user story)'
  ])}

  <h3 class="content-h3">INVEST Criteria — Detailed Analysis</h3>
  <p class="content-p">Bill Wake's INVEST acronym provides a quality checklist for user stories. A story that fails any INVEST criterion should be improved before entering a sprint. The exam tests your ability to identify which criterion is violated.</p>
  ${table(['Letter', 'Criterion', 'What It Means', 'How to Fix Violations'], [
    ['<strong>I</strong>', 'Independent', 'The story can be developed and delivered without requiring another specific story to be done first. Avoid stories that must be sequenced tightly.', 'Refactor the story to eliminate the dependency, or split the dependency into a shared component story that can be developed first'],
    ['<strong>N</strong>', 'Negotiable', 'The story is a description of desired behavior, NOT a contract. The implementation details are open for discussion between the PO and team.', 'Remove implementation-prescriptive language ("the system must use API X"). Describe the outcome, not the how.'],
    ['<strong>V</strong>', 'Valuable', 'The story delivers genuine value to a user or the business when completed on its own. A story that only delivers value when combined with 5 other stories is not truly valuable independently.', 'Reframe the story around a complete unit of user value. If it has no standalone value, it may need to be combined with related stories.'],

  <h3 class="content-h3">6 Story Splitting Patterns</h3>

  <p class="content-p">Acceptance criteria define the conditions the PO must verify are met before accepting a story as complete. They bridge the gap between the user story (intent) and the Definition of Done (quality standard). Best practice is to write them in Given-When-Then (GWT) format, which is also the foundation of BDD (Behavior-Driven Development).</p>

  <h2 class="content-h2" id="prioritization">Prioritization Techniques — Deep Dive</h2>
  <p class="content-p">Prioritization is one of the most critical skills of the Product Owner. The backlog must always be ordered so that the most valuable, highest-risk, or most time-sensitive items are at the top. Different techniques are appropriate for different contexts.</p>

  <h3 class="content-h3">MoSCoW — Most Common Technique</h3>

    '<strong>3. REFACTOR:</strong> Improve the code\'s design, readability, and structure WITHOUT changing its behavior (all tests must still pass). Remove duplication. Clean up.',
    '',
    'Repeat for every new behavior. Tests accumulate into a comprehensive safety net.',
    '',
    'KEY EXAM INSIGHT: TDD\'s primary benefit is not just test coverage — it\'s DESIGN. Writing tests first forces you to think from the consumer\'s perspective, leading to cleaner interfaces and simpler designs.'
  ])}

  ${table(['TDD Practice', 'Traditional Testing', 'Key Difference'], [
    ['Tests written BEFORE production code', 'Tests written AFTER production code', 'TDD drives design; traditional testing only validates existing code'],
    ['Tests serve as executable specification', 'Tests serve as quality gate', 'TDD documentation is always up-to-date because tests run constantly'],
    ['Refactoring is safe (tests catch regressions)', 'Refactoring is risky without comprehensive tests', 'TDD enables continuous refactoring and improvement'],
    ['Small, incremental progress (red-green-refactor)', 'Large feature then test', 'TDD forces smaller, verifiable steps'],
  ])}

  <h3 class="content-h3">Technical Debt — Understanding and Managing It</h3>
  <p class="content-p">Ward Cunningham coined "technical debt" in 1992. Like financial debt, small amounts can be strategic (take a shortcut now to meet a deadline and fix it later). But like financial debt, it accumulates interest — every sprint that passes with unaddressed technical debt makes future changes slower and more expensive.</p>
  ${table(['Technical Debt Type', 'Example', 'Recommended Response'], [
    ['<strong>Deliberate / Strategic</strong>', 'Intentional simplification to meet a launch deadline, with plan to refactor in Sprint 5', 'Document it, add refactoring story to backlog, schedule it deliberately'],
    ['<strong>Accidental</strong>', 'Developer didn\'t know the right design pattern at the time; now the code is messy', 'Discovered in retrospective or code review → add refactoring story to backlog'],
    ['<strong>Bit Rot</strong>', 'Code that was clean but has gradually deteriorated as new features were added without cleanup', 'Ongoing refactoring as part of DoD. Dedicated tech debt sprints if severe.'],
    ['<strong>Environmental</strong>', 'Outdated libraries, deprecated APIs, old frameworks that need upgrading', 'Track in backlog. Schedule upgrades before they become critical vulnerabilities.'],
  ])}

  <h2 class="content-h2" id="velocity-forecasting">Velocity Forecasting & Release Planning</h2>
  <p class="content-p">Velocity-based forecasting allows agile teams to predict when they will complete a given scope. It is not a commitment — it is a probabilistic forecast based on observed historical data. The exam may present calculation scenarios.</p>

  <div class="formula-card">
    <div class="formula-name">Sprints to Complete</div>
    <div class="formula-expr">Sprints needed = Total remaining story points ÷ Average velocity</div>
    <div class="formula-note">Example: 240 remaining points ÷ 40 avg velocity = 6 sprints. Always round UP. Account for team holidays/capacity changes.</div>
  </div>

  <div class="formula-card">
    <div class="formula-name">Average Velocity Calculation</div>
    <div class="formula-expr">Average velocity = Sum of completed story points ÷ Number of sprints</div>
    <div class="formula-note">Use the last 3-5 sprints. Exclude outlier sprints (e.g., holiday sprint with half capacity). Example: (38+44+42+36+40)÷5 = 40 pts/sprint</div>
  </div>

  <div class="formula-card">
    <div class="formula-name">Release Date Forecast</div>
    <div class="formula-expr">Forecast release date = Today + (Sprints needed × Sprint length)</div>
    <div class="formula-note">Example: Today + (6 sprints × 2 weeks) = Today + 12 weeks. This is a 50th percentile estimate — use Monte Carlo simulation for range forecasts.</div>
  </div>

  ${table(['Velocity Scenario', 'What It Might Mean', 'SM Action'], [
    ['Velocity is increasing sprint over sprint', 'Team is ramping up (new team) OR team is gaming velocity (inflating estimates)', 'If new team: celebrate. If experienced team: investigate estimate integrity.'],
    ['Velocity drops suddenly', 'New team members added (re-forming), major blocker, personal issues affecting team, new tech stack', 'Investigate in retrospective. Don\'t adjust commitment until new stable velocity is established.'],
    ['Velocity is highly erratic (±30% swings)', 'Inconsistent estimation, highly variable story complexity, external interruptions, incomplete DoD', 'Facilitate estimation calibration session. Improve DoD adherence. Reduce external interruptions.'],
    ['Velocity is stable and predictable', 'Healthy, experienced team. Consistent estimation and delivery.', 'Use for confident forecasting. Protect this stability.'],
  ])}

  <h2 class="content-h2" id="eco-tasks-d4">Official ECO — Domain 4: Tasks &amp; Enablers (Nov 2024)</h2>
  <p class="content-p">Domain 4 (Delivery, 28% of exam — joint largest) has 7 official tasks. The most technically detailed domain. Covers the complete delivery lifecycle: feedback, metrics, waste, risk, improvement, customer engagement, and flow optimization.</p>
  <table class="content-table"><thead><tr><th>Task</th><th>Official Enablers — Nov 2024 ECO</th></tr></thead><tbody><tr><td><strong>Task 1: Seek Early Feedback</strong></td><td>Evaluate customer satisfaction. Deliver work in small increments. Collect and incorporate stakeholders' feedback on a regular basis.</td></tr><tr><td><strong>Task 2: Manage Agile Metrics</strong></td><td>Determine which metrics are appropriate for a given audience. Radiate metrics across the relevant audience. Review and analyze metrics. Use metrics insights for decision making.</td></tr><tr><td><strong>Task 3: Manage Impediments and Risk</strong></td><td>Proactively identify risks and impediments. Engage the team to find the most appropriate course of action. Prioritize impediment removal and risk mitigation activities. Monitor/control risks and impediments. Use lessons learned to avoid risks/impediments recurrence.</td></tr><tr><td><strong>Task 4: Recognize and Eliminate Waste</strong></td><td>Visualize the end-to-end flow of value (value-added vs. non-value-added). Use metrics, tools, and feedback loops to identify waste. Prioritize waste reduction activities. Iterate on identification and reduction of waste.</td></tr><tr><td><strong>Task 5: Perform Continuous Improvements</strong></td><td>Obtain metrics and feedback to drive continuous improvements. Implement improvement actions. Evaluate the effectiveness of process improvement.</td></tr><tr><td><strong>Task 6: Actively Engage Customers</strong></td><td>Identify and analyze customer and their needs. Validate that iteration deliverables meet acceptance criteria. Encourage collaboration between customer and team.</td></tr><tr><td><strong>Task 7: Optimize Flow</strong></td><td>Limit work-in-progress at all levels. Shield team from interruptions (create team interfaces). Use metrics to analyze and improve flow.</td></tr></tbody></table>
  <div class="callout callout-navy"><div class="callout-title">🔑 Domain 4 Key Exam Points from Official ECO Enablers</div><ul><li><strong>Task 2 — Match metric to audience:</strong> ECO says 'appropriate for a GIVEN AUDIENCE.' Management wants release forecast/burnup. Development team wants sprint burndown/velocity. Stakeholders want business outcome metrics. This is a very common exam question type.</li><li><strong>Task 3 — Impediments vs. Risks:</strong> Impediments = happening NOW (remove immediately). Risks = might happen (mitigate proactively). ECO bundles them in Task 3. Proactive identification is key — don't wait for issues to surface.</li><li><strong>Task 4 — Value stream mapping:</strong> Explicitly in ECO Tools under Process Improvement. Maps end-to-end flow showing value-added and non-value-added steps. Primary tool for waste visualization and elimination.</li><li><strong>Task 5 — Evaluate effectiveness of improvements:</strong> 'Evaluate effectiveness' = did the retrospective action actually help? This is the ACT step of PDCA. Skipping this breaks the feedback loop for improvement.</li><li><strong>Task 7 — Shield from interruptions:</strong> 'Create team interfaces' = SM or PO acts as buffer between team and organizational noise. Stakeholders request features through PO, not directly to developers. Protects team focus and flow.</li></ul></div>
  
  `;
}
