      <div class="hero-stat"><span class="hero-stat-val">26</span><div class="hero-stat-label">Categories</div></div>
      <div class="hero-stat"><span class="hero-stat-val">25</span><div class="hero-stat-label">Unique/Rare Terms</div></div>
      <div class="hero-stat"><span class="hero-stat-val">4</span><div class="hero-stat-label">Domains Mapped</div></div>
    </div>
  </div>

  <h2 class="content-h2" id="glossary-unique">25 Unique & Rarely-Studied Terms — High Exam Value</h2>
  <p class="content-p">These terms appear in the IMT-PM glossary but are often missing from standard study guides. Knowing them separates Above Target from Target performance.</p>
  <table class="content-table"><thead><tr><th>Unique Term</th><th>Definition</th><th>Why It Matters for Exam</th></tr></thead><tbody><tr><td>A3 Thinking</td><td>Problem-solving on a single A3 (11x17) sheet: background, current condition, goal, root cause analysis, countermeasures, plan, and follow-up.</td><td>Lean process improvement tool. If a question mentions A3, it is asking about structured problem-solving in a Lean context.</td></tr><tr><td>ATDD (Acceptance Test-Driven Development)</td><td>Customer, dev, and tester collaborate to define acceptance tests BEFORE delivery begins. The acceptance criteria become executable tests.</td><td>Different from TDD (developer-driven). ATDD is customer-collaborative. BDD is a refinement of ATDD using Given-When-Then syntax.</td></tr><tr><td>BDD (Behavior-Driven Development)</td><td>Extends TDD with natural-language scenarios: Given [context], When [action], Then [outcome]. Bridges business and technical.</td><td>Commonly confused with TDD and ATDD. Key: BDD uses English-like scripts readable by non-developers. All three are test-first techniques.</td></tr><tr><td>Double Loop Learning</td><td>Learning that challenges the assumptions behind actions, not just the actions themselves. Requires questioning the model, not just the output.</td><td>Domain 1 mindset concept. Single loop = fix the problem. Double loop = question why the problem occurred systematically.</td></tr><tr><td>EVO (Evolutionary Value Delivery)</td><td>Credited as the first agile method, predating the Agile Manifesto. Unique: explicitly focuses on delivering multiple measurable value requirements.</td><td>Rare on exam but possible. Key identifier: "measurable value requirements to stakeholders" + "first agile method."</td></tr><tr><td>Flow Master</td><td>The Kanban-context equivalent of a Scrum Master. Coaches the team and manages the service request queue.</td><td>Newer Kanban terminology. If a question mentions "Flow Master" in a Kanban scenario, the answer involves Scrum-Master-equivalent behaviours.</td></tr><tr><td>Hoshin Kanri</td><td>Japanese strategic planning: aligns corporate direction with daily activities so everyone works toward the same objectives. Sometimes called "policy deployment."</td><td>Strategy alignment concept. Appears in Domain 2 questions about aligning team work to organisational vision and strategy.</td></tr><tr><td>I-shaped vs T-shaped vs Broken Comb</td><td>I-shaped = one deep skill, no breadth (risky). T-shaped = one deep skill + broad coverage (ideal). Broken Comb/Paint-Drip = multiple partial specialisations.</td><td>Team composition question type. Agile teams want T-shaped and Broken Comb members to reduce single-point-of-failure risk.</td></tr><tr><td>IDEAL Model</td><td>Organisational improvement: Initiating, Diagnosing, Establishing, Acting, Learning. A framework for driving organisational change.</td><td>Appears in questions about organisational improvement or agile transformation planning. Remember the acronym.</td></tr><tr><td>Kaizen Loop</td><td>A continuous improvement cycle for small, incremental improvements. Distinct from a Kaizen Event (which is a focused 3-5 day workshop).</td><td>Know the difference: Kaizen Event = short intense workshop. Kaizen Loop = ongoing incremental improvement embedded in daily work.</td></tr><tr><td>Lean Startup Canvas</td><td>A one-page business plan template covering problem, solution, unique value prop, MVP, channels, key metrics, and unfair advantage.</td><td>Lean Startup concepts (MVP, Build-Measure-Learn, Pivot) are explicitly in the ECO. Canvas = the planning tool for lean startup execution.</td></tr><tr><td>MBI (Minimum Business Increment)</td><td>Smaller than MVP. The smallest viable enhancement to an EXISTING product that delivers realised value. Not a hypothesis test — an actual increment.</td><td>Distinction: MVP = test a hypothesis on a new idea. MBI = smallest valuable addition to existing product. SAFe and DA use MBI terminology.</td></tr><tr><td>Mobbing / Ensemble Programming</td><td>Entire team works simultaneously on the same problem. More extreme than pair programming. Maximises knowledge transfer and quality.</td><td>A newer practice. If a question asks about maximising knowledge transfer and collective ownership, mobbing is the answer.</td></tr><tr><td>Niko Niko Calendar</td><td>Team members mark their daily happiness on a calendar (smiley/neutral/frown face). Visualises team morale over time.</td><td>Team health metric. If a question asks how to make team morale visible, Niko Niko Calendar is the specific tool.</td></tr><tr><td>Osmotic Communication</td><td>Information absorbed passively by team members in the same space — overhearing conversations, reading visible boards, sensing team energy.</td><td>Benefit of co-located teams. Crystal Clear relies heavily on osmotic communication. Explains why Crystal Clear works for small, co-located teams.</td></tr><tr><td>Pivot</td><td>A planned course correction based on validated learning. The team builds, measures, learns — and if the hypothesis was wrong, they pivot.</td><td>Lean Startup concept. Pivot ≠ failure. It is disciplined adaptation based on evidence. Contrasts with persevering (continuing the same strategy).</td></tr><tr><td>Portfolio Kanban (SAFe)</td><td>SAFe practice ensuring Epics are analysed and prioritised before PI boundaries. Makes portfolio-level work visible.</td><td>SAFe-specific. At portfolio level, work is managed as Epics on a Portfolio Kanban. Approved Epics flow to Program Backlogs.</td></tr><tr><td>Scrum of Scrums (SoS)</td><td>A scaling technique where representatives from each team meet regularly to coordinate dependencies across teams. Not a SAFe-specific technique.</td><td>Explicitly listed in ECO Domain 1 Task 3 enablers as an inter-team coordination approach.</td></tr><tr><td>Service Request Manager</td><td>The Kanban equivalent of a Product Owner. Orders service requests to maximise value in a continuous flow environment.</td><td>Newer Kanban terminology. Same accountability as PO but in a flow context rather than sprint context.</td></tr><tr><td>Specification by Example (SBE)</td><td>Uses concrete, realistic examples to define requirements instead of abstract statements. Executable specifications.</td><td>SBE → ATDD → BDD is the progression. SBE is the highest-level practice; BDD is the technical implementation. Often confused on exam.</td></tr><tr><td>Swarming</td><td>Multiple team members focus simultaneously on ONE impediment or blocked item. Temporarily violates WIP limits to resolve a critical blocker.</td><td>When a story is blocked and cannot be completed, the whole team swarms it. This is different from Mobbing, which is the normal working mode.</td></tr><tr><td>Tacit vs Explicit Knowledge</td><td>Explicit = codifiable (documents, wikis). Tacit = experiential, hard to transfer (judgement, intuition, expertise). Agile prefers face-to-face to transfer tacit knowledge.</td><td>Domain 2 Task 3 (Promote Knowledge Sharing). Face-to-face communication transfers tacit knowledge better than documentation.</td></tr><tr><td>Value Delivery Office (VDO)</td><td>A lean alternative to the traditional PMO. Focuses on coaching teams and building agile capability rather than enforcing process compliance.</td><td>VDO vs PMO is a common exam question. VDO = servant leadership at the organisational level. PMO = command-and-control of projects.</td></tr><tr><td>VoC (Voice of the Customer)</td><td>A technique translating customer requirements into technical requirements at each phase. Ensures the product is built for actual user needs.</td><td>Domain 3 Task 4 (Manage Value Delivery). The product must satisfy customer needs — VoC is how you formally capture and track those.</td></tr><tr><td>Wideband Delphi</td><td>More rigorous than planning poker: experts estimate individually, discuss outliers, re-estimate, repeat until consensus. Used for larger-grain estimation.</td><td>PMI lists Wideband Delphi as an estimation technique. Know it is consensus-based like planning poker but more structured and iterative.</td></tr><tr><td>WSJF (Weighted Shortest Job First)</td><td>SAFe prioritisation: WSJF = Cost of Delay / Job Size. Cost of Delay = User-Business Value + Time Criticality + Risk Reduction/Opportunity Enablement. Highest WSJF first.</td><td>WSJF is SAFe's primary prioritisation method. Different from Kano (features by customer satisfaction) and MoSCoW (must/should/could/won't).</td></tr></tbody></table>

  <div class="callout callout-amber"><div class="callout-title">How to Use This Glossary for Exam Prep</div><ul><li>Focus first on the 25 unique/rare terms above — these are high-value differentiators on the exam</li><li>For the full A-Z glossary below, use Ctrl+K search to find any term instantly across the entire site</li><li>Domain tags (D1/D2/D3/D4) show which exam section the term is most likely to appear in</li><li>Pay special attention to pairs of similar terms: TDD vs ATDD vs BDD, Mobbing vs Swarming vs Pairing, I-shaped vs T-shaped vs Broken Comb</li><li>The glossary maps directly to the ECO Tools & Techniques and Knowledge & Skills sections</li></ul></div>

  <h2 class="content-h2" id="glossary-az">Full A–Z Glossary</h2>
  <p class="content-p">Complete glossary from the IMT-PM PMI-ACP free resources page. Every term below is fair game on the PMI-ACP exam.</p>
  <h3 class="content-h3" id="glossary-A" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">A</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>A3</strong></td><td>A way of thinking and a systematic problem-solving process that collects all pertinent information on a single A3-size (11x17) sheet of paper. Named after the paper size. Used in Lean/Kaizen to communicate problems and solutions concisely.</td><td><span style="font-size:0.8em;color:#64748b">Lean / Process Improvement</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Acceptance Criteria</strong></td><td>A set of conditions that must be met before deliverables are accepted by the customer or Product Owner.</td><td><span style="font-size:0.8em;color:#64748b">Product / Quality</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Acceptance Test-Driven Development (ATDD)</strong></td><td>A method of collaboratively creating acceptance test criteria that are used to create acceptance tests before delivery begins. The customer, developer, and tester define acceptance criteria together up front.</td><td><span style="font-size:0.8em;color:#64748b">Engineering Practice</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Adaptive Approach</strong></td><td>A development approach in which requirements are subject to a high level of uncertainty and volatility and are likely to change throughout the project. Synonymous with agile approach.</td><td><span style="font-size:0.8em;color:#64748b">Life Cycle</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Affinity Diagram</strong></td><td>A diagram that shows large numbers of ideas classified into groups for review and analysis. Used in retrospectives and brainstorming to find patterns.</td><td><span style="font-size:0.8em;color:#64748b">Tool / Technique</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1/D4</span></td></tr><tr><td><strong>Affinity Grouping</strong></td><td>The process of classifying items into similar categories or collections based on likeness. Used in estimation (affinity estimation) to quickly size large backlogs.</td><td><span style="font-size:0.8em;color:#64748b">Estimation</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Agile</strong></td><td>A term describing a mindset of values and principles as set forth in the Agile Manifesto. Not a methodology — a mindset.</td><td><span style="font-size:0.8em;color:#64748b">Foundational</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Agile Coach</strong></td><td>An individual with knowledge and experience in agile who can train, mentor, and guide organisations and teams through their agile transformation.</td><td><span style="font-size:0.8em;color:#64748b">Role</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Agile Health Radar</strong></td><td>A visual tool used to assess the health of an agile project or team across multiple dimensions.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Agile Life Cycle</strong></td><td>An approach that is both iterative and incremental to refine work items and deliver frequently.</td><td><span style="font-size:0.8em;color:#64748b">Life Cycle</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Agile Manifesto</strong></td><td>The original and official definition of agile values and principles, created in 2001 by 17 software practitioners at Snowbird, Utah.</td><td><span style="font-size:0.8em;color:#64748b">Foundational</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Agile Mindset</strong></td><td>A way of thinking and behaving underpinned by the four values and twelve principles of the Agile Manifesto.</td><td><span style="font-size:0.8em;color:#64748b">Foundational</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Agile Practitioner / Agilist</strong></td><td>A person embracing the agile mindset who collaborates with like-minded colleagues in cross-functional teams.</td><td><span style="font-size:0.8em;color:#64748b">Role</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Agile Release Train (ART)</strong></td><td>In SAFe, a long-lived team of agile teams (5-12 teams, 50-125 people) that plans, commits, and executes together. Operates on a common PI cadence.</td><td><span style="font-size:0.8em;color:#64748b">SAFe</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Agile Unified Process (AUP)</strong></td><td>A simplified, agile version of the Rational Unified Process (RUP). Uses agile techniques while applying the RUP structure.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Anti-Pattern</strong></td><td>A known, flawed pattern of work that is not advisable. Examples: Scrummerfall, Zombie Stories, Velocity as a KPI.</td><td><span style="font-size:0.8em;color:#64748b">Process</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Architecture Owner</strong></td><td>An individual who owns architecture decisions for the team and facilitates the creation and evolution of the overall solution design.</td><td><span style="font-size:0.8em;color:#64748b">Role (SAFe/DA)</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Automated Code Quality Analysis</strong></td><td>The scripted testing of code base for bugs and vulnerabilities.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-B" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">B</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Backlog</strong></td><td>An ordered list of user-centric requirements that a team maintains for a product. Also known as Product Backlog.</td><td><span style="font-size:0.8em;color:#64748b">Artefact</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Backlog Refinement</strong></td><td>The progressive elaboration of project requirements and the ongoing activity in which the team collaboratively reviews, updates, and writes requirements. Not a one-time event.</td><td><span style="font-size:0.8em;color:#64748b">Process</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Baseline</strong></td><td>The approved version of a work product, used as a basis for comparison to actual results.</td><td><span style="font-size:0.8em;color:#64748b">Planning</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Behavior-Driven Development (BDD)</strong></td><td>A system design and validation practice that uses test-first principles and English-like scripts (Given-When-Then syntax). Bridges technical and business understanding.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Blended Agile</strong></td><td>Two or more agile frameworks, methods, elements, or practices used together. Example: Scrum + XP + Kanban (Scrumban).</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Blocker / Impediment</strong></td><td>An obstacle that prevents the team from achieving its objectives. Scrum Master's primary role is impediment removal.</td><td><span style="font-size:0.8em;color:#64748b">Process</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Broken Comb / Paint-Drip</strong></td><td>Refers to a person with various depths of specialisation in multiple skills. Has multiple partial T-shapes — breadth in many areas, deep in a few.</td><td><span style="font-size:0.8em;color:#64748b">Team</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Burndown Chart</strong></td><td>A graphical representation of the work remaining versus the time left in a timebox. Ideal burndown = straight diagonal line from top-left to bottom-right.</td><td><span style="font-size:0.8em;color:#64748b">Metric</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Burnup Chart</strong></td><td>A graphical representation of the work completed toward the release of a product. Shows scope line AND completed line — better than burndown for scope change visibility.</td><td><span style="font-size:0.8em;color:#64748b">Metric</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-C" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">C</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Cadence</strong></td><td>A rhythm of execution. In Scrum: sprint cadence. In SAFe: PI cadence. Cadence creates predictability and reduces coordination overhead.</td><td><span style="font-size:0.8em;color:#64748b">Principle</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Cause-and-Effect Diagram</strong></td><td>A visual representation (Ishikawa/fishbone) that traces an undesirable effect back to its root cause across People, Process, Tools, Environment categories.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2/D4</span></td></tr><tr><td><strong>Collective Code Ownership</strong></td><td>A project acceleration technique whereby any team member is authorised to modify any project work product, emphasising team-wide ownership and accountability.</td><td><span style="font-size:0.8em;color:#64748b">XP Practice</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Continuous Delivery</strong></td><td>The practice of delivering feature increments immediately to customers, often through small batches and automation. Every build is potentially releasable.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Continuous Integration (CI)</strong></td><td>A practice in which each team member's work is frequently integrated and validated with others. Developers integrate to shared repo multiple times per day.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Cross-Functional Team</strong></td><td>A team that includes practitioners with all the skills necessary to deliver valuable product increments without external dependencies.</td><td><span style="font-size:0.8em;color:#64748b">Team</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1/D2</span></td></tr><tr><td><strong>Crystal Family</strong></td><td>A collection of lightweight agile methods focused on adaptability. Colour (Clear, Yellow, Orange, Red, Maroon, Diamond) chosen by team size and system criticality.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Cumulative Flow Diagram (CFD)</strong></td><td>A chart indicating features completed over time, features in other states of development, and those in the backlog. Widening band = bottleneck.</td><td><span style="font-size:0.8em;color:#64748b">Metric</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-D" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">D</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Daily Scrum / Daily Standup</strong></td><td>A 15-minute daily collaboration meeting where the team reviews yesterday's progress, today's plan, and any obstacles. Not a status report to the manager.</td><td><span style="font-size:0.8em;color:#64748b">Scrum Event</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Definition of Done (DoD)</strong></td><td>A team's checklist of all criteria required to be met so a deliverable can be considered ready for customer use. If it doesn't meet DoD, it's not Done.</td><td><span style="font-size:0.8em;color:#64748b">Quality</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3/D4</span></td></tr><tr><td><strong>Definition of Ready (DoR)</strong></td><td>A team's checklist for a user story confirming it has all the information needed before the team begins work. Prevents mid-sprint blockers.</td><td><span style="font-size:0.8em;color:#64748b">Quality</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>DevOps</strong></td><td>A collection of practices creating a smooth flow of delivery by improving collaboration between development and operations. CI/CD pipeline is the technical manifestation.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Disciplined Agile (DA)</strong></td><td>A process decision framework enabling simplified process decisions around incremental and iterative solution delivery. Acquired by PMI in 2019.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Double Loop Learning</strong></td><td>A process that challenges underlying values and assumptions to better elaborate root causes, rather than just addressing symptoms (Single Loop Learning).</td><td><span style="font-size:0.8em;color:#64748b">Learning</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Dynamic Systems Development Method (DSDM)</strong></td><td>An agile project delivery framework best known for its emphasis on constraint-driven delivery and MoSCoW prioritisation. 8 principles.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-E" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">E</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Economic Framework</strong></td><td>Decision rules in SAFe to align work to financial objectives and guide economic decision-making across Solution Trains.</td><td><span style="font-size:0.8em;color:#64748b">SAFe</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Emotional Intelligence (EQ)</strong></td><td>The ability to identify, assess, and manage personal and group emotions. Core leadership skill tested heavily in Domain 2.</td><td><span style="font-size:0.8em;color:#64748b">Leadership</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Epic</strong></td><td>A large, related body of work intended to hierarchically organise requirements and deliver specific business outcomes. Decomposes into Features, then User Stories.</td><td><span style="font-size:0.8em;color:#64748b">Backlog</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Estimate at Completion (EAC)</strong></td><td>The expected total cost of completing all work: EAC = BAC / CPI (when original estimate is flawed) or EAC = AC + ETC (when original estimate is still valid).</td><td><span style="font-size:0.8em;color:#64748b">EVM</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Estimate to Complete (ETC)</strong></td><td>The expected cost to finish all remaining project work: ETC = EAC - AC.</td><td><span style="font-size:0.8em;color:#64748b">EVM</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Evolutionary Value Delivery (EVO)</strong></td><td>Credited as the first agile method. Unique focus on delivering multiple measurable value requirements to stakeholders.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>eXtreme Programming (XP)</strong></td><td>An agile software development method emphasising higher quality software, responsiveness to change, and frequent releases through engineering practices.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-F" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">F</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Feature</strong></td><td>A set of related requirements or functionalities that provides value to an organisation. In SAFe, Features are delivered within a PI and decompose into User Stories.</td><td><span style="font-size:0.8em;color:#64748b">Backlog</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Feature-Driven Development (FDD)</strong></td><td>A lightweight agile method driven from the perspective of features valued by clients. Uses 5 processes: Develop Model, Build Feature List, Plan by Feature, Design by Feature, Build by Feature.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Fit for Purpose</strong></td><td>A product that is suitable for its intended purpose.</td><td><span style="font-size:0.8em;color:#64748b">Quality</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Fit for Use</strong></td><td>A product that is usable in its current form to achieve its intended purpose.</td><td><span style="font-size:0.8em;color:#64748b">Quality</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Flow</strong></td><td>The measure of how efficiently work moves through a given process or framework. Kanban optimises for flow.</td><td><span style="font-size:0.8em;color:#64748b">Kanban</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Flow Master</strong></td><td>The coach for a team working in a continuous flow / Kanban context. Equivalent to Scrum Master.</td><td><span style="font-size:0.8em;color:#64748b">Role</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-H" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">H</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Hoshin Kanri</strong></td><td>A strategy/policy deployment method aligning corporate direction with daily activities, ensuring everyone works toward the same strategic objectives.</td><td><span style="font-size:0.8em;color:#64748b">Lean / Strategy</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Hybrid Approach</strong></td><td>A combination of agile and non-agile elements. Uses predictive planning for known, stable areas and agile for uncertain, complex areas.</td><td><span style="font-size:0.8em;color:#64748b">Life Cycle</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-I" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">I</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>I-shaped Skills</strong></td><td>A person with a single deep specialisation and no breadth in other team skills. Opposite of T-shaped. Creates single points of failure.</td><td><span style="font-size:0.8em;color:#64748b">Team</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>IDEAL Model</strong></td><td>An organisational improvement model: Initiating, Diagnosing, Establishing, Acting, Learning. Framework for organisational change.</td><td><span style="font-size:0.8em;color:#64748b">Improvement</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Impact Mapping</strong></td><td>A strategic planning technique acting as a roadmap by mapping: Why (goal) → Who (actors) → How (impacts) → What (deliverables).</td><td><span style="font-size:0.8em;color:#64748b">Planning</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Impediment</strong></td><td>An obstacle preventing the team from achieving its objectives. Same as Blocker. Scrum Master removes or escalates impediments.</td><td><span style="font-size:0.8em;color:#64748b">Process</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Incremental Life Cycle</strong></td><td>An approach providing finished deliverables that customers may be able to use immediately. Each increment adds functionality.</td><td><span style="font-size:0.8em;color:#64748b">Life Cycle</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Information Radiator</strong></td><td>A visible physical display providing up-to-the-minute information without requiring anyone to disturb the team. Examples: task board, burndown, CFD.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Inspect and Adapt (I&A)</strong></td><td>A SAFe event at the end of each PI where the ART demonstrates its current state of the solution, measures performance, and improves.</td><td><span style="font-size:0.8em;color:#64748b">SAFe</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Iteration</strong></td><td>A timeboxed cycle of development in which all work needed to deliver value is performed. Synonymous with Sprint in Scrum.</td><td><span style="font-size:0.8em;color:#64748b">Process</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Iterative Life Cycle</strong></td><td>An approach allowing feedback for unfinished work to improve and modify that work. Focus on refinement over time.</td><td><span style="font-size:0.8em;color:#64748b">Life Cycle</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-K" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">K</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Kaizen Events</strong></td><td>Events aimed at improvement of the system. Short, focused improvement workshops (typically 3-5 days).</td><td><span style="font-size:0.8em;color:#64748b">Lean</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Kaizen Loop</strong></td><td>A continuous improvement cycle used to identify and implement small, incremental improvements.</td><td><span style="font-size:0.8em;color:#64748b">Lean</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Kanban Board</strong></td><td>A visualisation tool enabling improvements to the flow of work by making bottlenecks and work quantities visible.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Kanban Method</strong></td><td>An agile method inspired by Toyota's inventory control system, used for knowledge work. Core practices: Visualise, Limit WIP, Manage Flow.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Kano Model</strong></td><td>A technique modelling product features from the customer's viewpoint: Basic (must-have), Performance (more = better), Excitement (delighters), Indifferent, Reverse.</td><td><span style="font-size:0.8em;color:#64748b">Prioritisation</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-L" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">L</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Large Scale Scrum (LeSS)</strong></td><td>A product development framework extending Scrum with scaling guidelines while preserving Scrum's original purposes. Max 8 teams, one Product Backlog.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Lean Portfolio Management (LPM)</strong></td><td>A SAFe competency connecting strategy and execution: strategy and investment funding, agile portfolio operations, and lean governance.</td><td><span style="font-size:0.8em;color:#64748b">SAFe</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Lean Software Development (LSD)</strong></td><td>An adaptation of lean manufacturing to software: 7 principles (Eliminate Waste, Amplify Learning, Decide Late, Deliver Fast, Empower Team, Build Integrity In, See the Whole).</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Lean Startup Canvas</strong></td><td>A one-page template communicating a business plan with key stakeholders. Focus on problem, solution, MVP, and key metrics.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Life Cycle</strong></td><td>The process through which a product is imagined, created, and put into use. Can be predictive, iterative, incremental, agile, or hybrid.</td><td><span style="font-size:0.8em;color:#64748b">Foundational</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-M" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">M</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Minimum Business Increment (MBI)</strong></td><td>The smallest viable enhancement to an existing product or service that delivers realised value. Related to but smaller than MVP.</td><td><span style="font-size:0.8em;color:#64748b">Value</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Minimum Viable Product (MVP)</strong></td><td>The fewest features delivering enough value to test a hypothesis with real users. Not the minimum features to ship — minimum features to LEARN.</td><td><span style="font-size:0.8em;color:#64748b">Value</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Mobbing</strong></td><td>A technique in which multiple team members focus simultaneously on a particular work item. Like pair programming but with the whole team.</td><td><span style="font-size:0.8em;color:#64748b">Practice</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>MoSCoW Method</strong></td><td>A prioritisation technique: Must Have, Should Have, Could Have, Won't Have (this time). Used heavily in DSDM.</td><td><span style="font-size:0.8em;color:#64748b">Prioritisation</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-N" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">N</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Net Promoter Score (NPS)</strong></td><td>An index measuring the willingness of customers to recommend a product or service. Scale: -100 to +100. Key value delivery metric.</td><td><span style="font-size:0.8em;color:#64748b">Metric</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Niko Niko Calendar</strong></td><td>A tool used to gauge the mood, satisfaction, and morale of team members over time. Team members rate their daily happiness visually.</td><td><span style="font-size:0.8em;color:#64748b">Team Health</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-O" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">O</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Organisational Bias</strong></td><td>The preferences of an organisation on scales of: exploration vs execution, speed vs stability, quantity vs quality, flexibility vs predictability.</td><td><span style="font-size:0.8em;color:#64748b">Culture</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Osmotic Communication</strong></td><td>Means of receiving information without direct communication — by overhearing and through nonverbal cues. Benefit of co-located teams.</td><td><span style="font-size:0.8em;color:#64748b">Communication</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-P" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">P</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Pair Programming</strong></td><td>Two developers working simultaneously at one workstation. One types (Driver), the other reviews (Navigator). Higher quality, shared knowledge.</td><td><span style="font-size:0.8em;color:#64748b">XP Practice</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Pair Work</strong></td><td>A technique pairing two team members to work simultaneously on the same work item. Pair Programming is pair work focused on code.</td><td><span style="font-size:0.8em;color:#64748b">Practice</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Personas</strong></td><td>An archetype user representing a set of similar end users described with their goals, motivations, and representative personal characteristics.</td><td><span style="font-size:0.8em;color:#64748b">Analysis</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>PI Planning</strong></td><td>A 2-day face-to-face event in SAFe where all ART teams plan together for the next Program Increment (8-12 weeks). The heartbeat of SAFe.</td><td><span style="font-size:0.8em;color:#64748b">SAFe</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Pivot</strong></td><td>A planned course correction designed to test a new hypothesis about the product or strategy. From Lean Startup methodology.</td><td><span style="font-size:0.8em;color:#64748b">Product</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Plan-Do-Check-Act (PDCA)</strong></td><td>An iterative management method (Deming Cycle) for continuous improvement of processes and products. Also: Plan → Do → Study → Act (PDSA).</td><td><span style="font-size:0.8em;color:#64748b">Improvement</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Planning Poker</strong></td><td>A collaborative relative estimation technique using a Fibonacci-like scale (1, 2, 3, 5, 8, 13, 20, 40, 100). Consensus-based.</td><td><span style="font-size:0.8em;color:#64748b">Estimation</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Portfolio Kanban</strong></td><td>SAFe practice ensuring Epics and Enablers are reasoned, analysed, prioritised, and have acceptance criteria before PI boundary.</td><td><span style="font-size:0.8em;color:#64748b">SAFe</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Predictive Life Cycle</strong></td><td>Traditional approach with bulk planning upfront, executed in a single pass. Waterfall is the most common predictive life cycle.</td><td><span style="font-size:0.8em;color:#64748b">Life Cycle</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Product Owner</strong></td><td>Person responsible for maximising product value and accountable for the end product. Owns the Product Backlog. Single point of truth on priority.</td><td><span style="font-size:0.8em;color:#64748b">Role</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Program Increment (PI)</strong></td><td>A timebox in SAFe during which an ART delivers incremental value. Typically 8-12 weeks (4-5 two-week sprints + 1 Innovation & Planning iteration).</td><td><span style="font-size:0.8em;color:#64748b">SAFe</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Progressive Elaboration</strong></td><td>The iterative process of increasing detail in plans as greater information and more accurate estimates become available.</td><td><span style="font-size:0.8em;color:#64748b">Planning</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Prototype</strong></td><td>A working model used to obtain early feedback on the expected product before actually building it. Reduces risk of building wrong thing.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-R" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">R</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Refactoring</strong></td><td>Improving internal code structure without altering external behaviour. Part of the TDD Red-Green-Refactor cycle.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Relative Estimating</strong></td><td>Creating estimates from comparison against similar work, considering effort, complexity, and uncertainty. Story points are relative estimates.</td><td><span style="font-size:0.8em;color:#64748b">Estimation</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Retrospective</strong></td><td>A regularly occurring workshop exploring work and results to improve both process and product. The 5-phase format: Set stage, Gather data, Generate insights, Decide, Close.</td><td><span style="font-size:0.8em;color:#64748b">Scrum Event</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1/D4</span></td></tr><tr><td><strong>Risk-Adjusted Backlog</strong></td><td>A backlog including product work AND actions to address threats and opportunities. Risks are made visible as backlog items.</td><td><span style="font-size:0.8em;color:#64748b">Risk</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Rolling Wave Planning</strong></td><td>Iterative planning where near-term work is planned in detail and future work is planned at a higher level. Cone of uncertainty principle.</td><td><span style="font-size:0.8em;color:#64748b">Planning</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Root Cause Analysis</strong></td><td>Analytical method to determine the basic underlying reason causing a variance, defect, or risk. Tools: 5 Whys, Ishikawa diagram.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2/D4</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-S" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">S</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Scaled Agile Framework (SAFe)</strong></td><td>A knowledge base of integrated patterns for enterprise-scale lean-agile development. 4 levels: Team, Program, Large Solution, Portfolio.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Scrum Board</strong></td><td>An information radiator managing product and sprint backlogs and showing flow of work and bottlenecks.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Scrum Master</strong></td><td>The coach of the development team and process owner in Scrum. Removes obstacles, facilitates events, defends team from disruptions. Servant leader.</td><td><span style="font-size:0.8em;color:#64748b">Role</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Scrum of Scrums</strong></td><td>A technique to operate Scrum at scale for multiple teams. Regular meeting of SM representatives to coordinate dependencies and integrations.</td><td><span style="font-size:0.8em;color:#64748b">Scaling</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Scrumban</strong></td><td>A management framework where teams use Scrum as their working model and Kanban Method as a lens for continuous improvement.</td><td><span style="font-size:0.8em;color:#64748b">Framework</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Self-Organising Team</strong></td><td>A cross-functional team where people fluidly assume leadership as needed to achieve objectives. No external assignment of work.</td><td><span style="font-size:0.8em;color:#64748b">Team</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Servant Leadership</strong></td><td>The practice of leading through service to the team — focusing on understanding and addressing the needs of team members to enable highest performance.</td><td><span style="font-size:0.8em;color:#64748b">Leadership</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Service Request Manager</strong></td><td>Equivalent to Product Owner in a Kanban/continuous flow context. Responsible for ordering service requests to maximise value.</td><td><span style="font-size:0.8em;color:#64748b">Role</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Single Loop Learning</strong></td><td>Attempting to solve problems using predefined methods without questioning those methods. Contrast with Double Loop Learning.</td><td><span style="font-size:0.8em;color:#64748b">Learning</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Smoke Testing</strong></td><td>Using a lightweight set of tests to ensure the most important system functions work as intended. Quick sanity check before full testing.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Specification by Example (SBE)</strong></td><td>A collaborative approach defining requirements using realistic examples instead of abstract statements. Closely related to ATDD and BDD.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Spike</strong></td><td>A short timeboxed research or prototype to prove viability of a solution. Risk-based spike: architectural. Research spike: feasibility.</td><td><span style="font-size:0.8em;color:#64748b">Practice</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3/D4</span></td></tr><tr><td><strong>Stacey Matrix</strong></td><td>A tool analysing two dimensions to determine project complexity: (a) uncertainty of requirements and (b) uncertainty of technology. Identifies when to use agile.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>Story Point</strong></td><td>A unit-less measure used in relative user story estimation. Captures effort, complexity, and uncertainty in a single number.</td><td><span style="font-size:0.8em;color:#64748b">Estimation</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Swarming</strong></td><td>A technique where multiple team members focus collectively on resolving a specific impediment. Temporarily suspend WIP limits to resolve a blocker.</td><td><span style="font-size:0.8em;color:#64748b">Practice</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-T" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">T</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>T-shaped Skills</strong></td><td>A person with one deep area of specialisation and broad ability in all other team skills. Agile teams prefer T-shaped over I-shaped.</td><td><span style="font-size:0.8em;color:#64748b">Team</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1/D2</span></td></tr><tr><td><strong>Tacit Knowledge</strong></td><td>Personal knowledge difficult to articulate and share — beliefs, experience, insights. Contrast with Explicit Knowledge (codifiable).</td><td><span style="font-size:0.8em;color:#64748b">Knowledge</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Task Board</strong></td><td>A visual representation of progress of planned work. Everyone can see the status of all tasks in the current iteration.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Team Charter</strong></td><td>A document recording team values, agreements, and operating guidelines. Establishes clear expectations for acceptable behaviour.</td><td><span style="font-size:0.8em;color:#64748b">Team</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1/D2</span></td></tr><tr><td><strong>Technical Debt</strong></td><td>The deferred cost of work not done at an earlier point. Taking shortcuts now = paying interest later through slower velocity and more bugs.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Test-Driven Development (TDD)</strong></td><td>A technique where tests are defined before work begins. Red (failing test) → Green (passing code) → Refactor. Zero-defect mindset.</td><td><span style="font-size:0.8em;color:#64748b">Engineering</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Timebox</strong></td><td>A fixed period of time for an iteration or event. Examples: Sprint (1-4 weeks), Daily Scrum (15 min), Sprint Review (4 hrs/month).</td><td><span style="font-size:0.8em;color:#64748b">Process</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-U" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">U</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>User Story</strong></td><td>A brief description of deliverable value for a specific user: 'As a [role], I want [feature], so that [benefit].' A promise for a conversation.</td><td><span style="font-size:0.8em;color:#64748b">Artefact</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>User Story Mapping</strong></td><td>A visual practice organising work into a model showing the sets of high-value features to create over time. Rows = user journey, Columns = detail.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>UX Design</strong></td><td>The process of enhancing user experience by improving usability and accessibility. User-centred design practices integral to agile product development.</td><td><span style="font-size:0.8em;color:#64748b">Design</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-V" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">V</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Value Delivery Office (VDO)</strong></td><td>A project delivery support structure focusing on coaching teams and building agile skills. Lean alternative to traditional PMO.</td><td><span style="font-size:0.8em;color:#64748b">Organisation</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Value Stream</strong></td><td>An organisational construct focusing on the flow of value to customers through delivery of specific products or services.</td><td><span style="font-size:0.8em;color:#64748b">Lean</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Value Stream Mapping</strong></td><td>A lean technique to document, analyse, and improve the flow of information/materials required to produce a product. Identifies value-added vs non-value-added steps.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Velocity</strong></td><td>A measure of a team's productivity rate — story points of DoD-met stories completed per sprint. Used for forecasting, not comparing teams.</td><td><span style="font-size:0.8em;color:#64748b">Metric</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Velocity Chart</strong></td><td>A chart tracking the rate at which deliverables are produced, validated, and accepted within a predefined interval. Useful for release forecasting.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Virtual Team</strong></td><td>A group with a shared goal who work in different locations and engage primarily through electronic communications.</td><td><span style="font-size:0.8em;color:#64748b">Team</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D2</span></td></tr><tr><td><strong>Vision Statement</strong></td><td>A high-level description of expectations for a product including target market, users, major benefits, and differentiation.</td><td><span style="font-size:0.8em;color:#64748b">Planning</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Voice of the Customer (VoC)</strong></td><td>A planning method providing products/services that truly reflect customer requirements by translating those requirements into technical requirements.</td><td><span style="font-size:0.8em;color:#64748b">Tool</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr></tbody></table><h3 class="content-h3" id="glossary-W" style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:4px">W</h3><table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Category</th><th>Domain</th></tr></thead><tbody><tr><td><strong>Waste</strong></td><td>Activities consuming resources and/or time without adding value. The 7 Lean wastes: TIMWOOD (Transport, Inventory, Motion, Waiting, Overproduction, Over-processing, Defects).</td><td><span style="font-size:0.8em;color:#64748b">Lean</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D4</span></td></tr><tr><td><strong>Wideband Delphi</strong></td><td>An estimation method where subject matter experts go through multiple rounds of individual estimates with team discussion after each round until consensus. More rigorous than planning poker.</td><td><span style="font-size:0.8em;color:#64748b">Estimation</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr><tr><td><strong>Work Breakdown Structure (WBS)</strong></td><td>A hierarchical decomposition of total project scope. Deliverable-oriented. Used in predictive projects; agile uses backlog decomposition instead.</td><td><span style="font-size:0.8em;color:#64748b">Planning</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D1</span></td></tr><tr><td><strong>WSJF (Weighted Shortest Job First)</strong></td><td>SAFe prioritisation formula: WSJF = Cost of Delay / Job Duration (Size). Prioritise items with highest WSJF to maximise economic benefit.</td><td><span style="font-size:0.8em;color:#64748b">SAFe / Prioritisation</span></td><td><span style="font-size:0.8em;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:10px">D3</span></td></tr></tbody></table>

y</td><td>Yes — feature iterations</td></tr></tbody></table>

ritises; team estimates. Neither overrides the other.</td></tr><tr><td>System Metaphor</td><td>A shared analogy describing the system architecture</td><td>Replaces formal architecture docs with a common vocabulary.</td></tr></tbody></table>
