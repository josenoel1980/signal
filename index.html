  <table class="content-table"><thead><tr><th>#</th><th>Principle</th><th>Agile Application</th><th>Lean Waste Addressed</th></tr></thead><tbody><tr><td>1</td><td>Eliminate Waste</td><td>Remove anything not directly adding customer value (meetings, docs, hand-offs)</td><td>All 7 wastes (TIMWOOD)</td></tr><tr><td>2</td><td>Amplify Learning</td><td>Short feedback loops; experiments; retrospectives; pair programming</td><td>Waiting, Over-processing</td></tr><tr><td>3</td><td>Decide as Late as Possible</td><td>Defer irreversible decisions until last responsible moment</td><td>Overproduction, Inventory</td></tr><tr><td>4</td><td>Deliver as Fast as Possible</td><td>Reduce batch size; shorten cycle time; CI/CD pipeline</td><td>Waiting, Transport</td></tr><tr><td>5</td><td>Empower the Team</td><td>Self-organising teams; trust developers to solve problems</td><td>Motion, Over-processing</td></tr><tr><td>6</td><td>Build Integrity In</td><td>TDD, refactoring, DoD, built-in quality vs. inspected-in quality</td><td>Defects</td></tr><tr><td>7</td><td>See the Whole</td><td>Value stream mapping; systems thinking; optimise whole, not parts</td><td>All wastes (systemic view)</td></tr></tbody></table>

  <h3 class="content-h3">SAFe (Scaled Agile Framework) Key Concepts</h3>
  <table class="content-table"><thead><tr><th>Level</th><th>Name</th><th>Key Elements</th><th>Exam Focus</th></tr></thead><tbody><tr><td>Team</td><td>Agile Team</td><td>Scrum/Kanban teams (5-11 people); 2-week sprints</td><td>Foundation of SAFe. Teams use standard Scrum/Kanban.</td></tr><tr><td>Program</td><td>Agile Release Train (ART)</td><td>5-12 teams aligned to single value stream; PI Planning every 8-12 weeks</td><td>PI Planning is the heartbeat of SAFe. 2-day event.</td></tr><tr><td>Large Solution</td><td>Solution Train</td><td>Multiple ARTs coordinating on large complex solutions</td><td>For solutions too complex for one ART.</td></tr><tr><td>Portfolio</td><td>Portfolio Kanban</td><td>Strategic themes; Lean budgeting; Epic owners</td><td>Business alignment; funding allocation; OKRs.</td></tr><tr><td>PI Planning</td><td>Program Increment Planning</td><td>All ART teams plan together for next 8-12 weeks. 2-day event.</td><td>The single most important SAFe event. Face-to-face preferred.</td></tr><tr><td>Inspect & Adapt (I&A)</td><td>End-of-PI retrospective + problem-solving workshop</td><td>Retrospective + root cause analysis + improvement backlog</td><td>SAFe continuous improvement mechanism at ART level.</td></tr><tr><td>WSJF</td><td>Weighted Shortest Job First = CoD / Job Duration</td><td>Cost of Delay / Job Size. Prioritise highest WSJF first.</td><td>SAFe prioritisation method. Different from MoSCoW/Kano.</td></tr><tr><td>Enabler Stories</td><td>Architectural/infrastructure stories that enable future features</td><td>Included in backlog. Not optional — technical foundation matters.</td><td>Prevents technical debt at scale.</td></tr></tbody></table>

  <h3 class="content-h3">DSDM (Dynamic Systems Development Method) — 8 Principles</h3>
  <table class="content-table"><thead><tr><th>#</th><th>Principle</th><th>Meaning</th></tr></thead><tbody><tr><td>1</td><td>Focus on the business need</td><td>Every decision evaluated against whether it serves the business objective</td></tr><tr><td>2</td><td>Deliver on time</td><td>Timebox is sacrosanct. Reduce scope (MoSCoW) rather than slip the date</td></tr><tr><td>3</td><td>Collaborate</td><td>All stakeholders actively engaged; not just consulted</td></tr><tr><td>4</td><td>Never compromise quality</td><td>Quality is fixed; agree the DoD upfront and never lower it</td></tr><tr><td>5</td><td>Build incrementally from firm foundations</td><td>Enough upfront design to enable incremental delivery without rework</td></tr><tr><td>6</td><td>Develop iteratively</td><td>Iterative refinement expected; not all detail known upfront</td></tr><tr><td>7</td><td>Communicate continuously and clearly</td><td>Face-to-face preferred; models and prototypes over documents</td></tr><tr><td>8</td><td>Demonstrate control</td><td>Proactively manage, monitor, and report; be in control of process</td></tr></tbody></table><div class="callout callout-amber"><div class="callout-title">DSDM MoSCoW Prioritisation</div><ul><li><strong>M</strong>ust Have: non-negotiable for the timebox. If not delivered, the release has no value.</li><li><strong>S</strong>hould Have: important but not vital. Skip only if necessary to deliver on time.</li><li><strong>C</strong>ould Have: nice to have. First to drop when time is short.</li><li><strong>W</strong>on't Have (this time): agreed out of scope for this timebox. Not forever — just not now.</li><li>DSDM rule: Musts must not exceed 60% of effort — leaving room for Shoulds and Coulds to flex.</li></ul></div>

  <h3 class="content-h3">Crystal Family</h3>
  <table class="content-table"><thead><tr><th>Crystal Colour</th><th>Team Size</th><th>System Criticality</th><th>Key Characteristic</th></tr></thead><tbody><tr><td>Crystal Clear</td><td>1-6 people</td><td>Comfort (C) — low criticality</td><td>Minimum process; osmotic communication; frequent delivery</td></tr><tr><td>Crystal Yellow</td><td>7-20 people</td><td>Discretionary Money (D)</td><td>More formalised; increased documentation needs</td></tr><tr><td>Crystal Orange</td><td>21-40 people</td><td>Essential Money (E)</td><td>Defined roles; integration workshops; system-wide testing</td></tr><tr><td>Crystal Red</td><td>40-80 people</td><td>Essential Money (E) — large</td><td>Heavier process; cross-team coordination required</td></tr><tr><td>Crystal Maroon</td><td>80-200 people</td><td>Essential Money (E) — very large</td><td>Near-traditional processes; formal milestones</td></tr><tr><td>Crystal Diamond/Sapphire</td><td>200+ / Life Critical</td><td>Life (L) — human safety at risk</td><td>Heaviest process; formal verification; safety audits</td></tr></tbody></table><div class="callout callout-navy"><div class="callout-title">Crystal Key Insight</div><ul><li>Crystal is a family, not a single framework. You choose the colour based on team SIZE and system CRITICALITY.</li><li>The larger/more critical the project, the more ceremony Crystal requires.</li><li>All Crystal variants share: people focus, communication over documentation, reflective improvement.</li><li>Crystal Clear is the most widely practised. Exam questions usually contrast Crystal Clear (informal) vs. Crystal Orange/Red (more structured).</li></ul></div>

  <h3 class="content-h3">FDD (Feature-Driven Development) — 5 Processes</h3>
  <table class="content-table"><thead><tr><th>Process</th><th>Description</th><th>Output</th><th>Who Leads</th></tr></thead><tbody><tr><td>1. Develop Overall Model</td><td>Collaborative domain modelling; walk-through of requirements</td><td>Overall object model</td><td>Chief Architect + Domain Experts</td></tr><tr><td>2. Build Features List</td><td>Decompose domain into Subject Areas → Business Activities → Features</td><td>Prioritised feature list</td><td>Chief Programmers + Domain Experts</td></tr><tr><td>3. Plan by Feature</td><td>Sequence features; assign to chief programmers; high-level schedule</td><td>Development plan</td><td>Development Manager</td></tr><tr><td>4. Design by Feature</td><td>Design a feature set in a design package (class diagram, sequence)</td><td>Design package per feature set</td><td>Chief Programmer + Class Owners</td></tr><tr><td>5. Build by Feature</td><td>Implement, unit test, code inspect, promote to build</td><td>Completed feature(s)</td><td>Class Owners</td></tr></tbody></table><div class="callout callout-green"><div class="callout-title">Framework Selection Guide (Exam Scenarios)</div><ul><li><strong>Small co-located team, technical excellence needed?</strong> → XP</li><li><strong>Operational/support work, variable demand, no fixed iterations?</strong> → Kanban</li><li><strong>Cross-functional product dev, complex requirements?</strong> → Scrum</li><li><strong>Fixed time and budget, MoSCoW prioritisation, business-driven?</strong> → DSDM</li><li><strong>Large enterprise, multiple teams, portfolio alignment?</strong> → SAFe</li><li><strong>Small people-centric team, low process overhead?</strong> → Crystal Clear</li><li><strong>Large team, feature-centric, structured delivery?</strong> → FDD</li><li><strong>Waste elimination, flow optimisation, continuous delivery?</strong> → Lean / Kanban</li></ul></div>
  
  <h2 class="content-h2" id="six-artifacts">The 6 Agile Artifacts</h2>
  <p class="content-p">Beyond the 3 official Scrum artifacts, agile teams use 3 additional strategic artifacts. All 6 together form a hierarchy from vision to delivery.</p>
  <table class="content-table"><thead><tr><th>Artifact</th><th>Level</th><th>Owner</th><th>Purpose</th><th>Boundary It Sets</th></tr></thead><tbody><tr><td><strong>1. Product Vision Statement</strong></td><td>Strategic</td><td>Product Owner / Sponsor</td><td>Elevator pitch describing end-goal: differentiation, competition, organisational strategy alignment</td><td>Outermost boundary — defines what is part of the project at all</td></tr><tr><td><strong>2. Product Roadmap</strong></td><td>Strategic / Tactical</td><td>Product Owner</td><td>Holistic view of high-level functionality needed to achieve the vision; initial cut at the backlog; "big picture" for team focus</td><td>Second boundary — high-level functional scope for the full product</td></tr><tr><td><strong>3. Release Plan</strong></td><td>Tactical</td><td>Product Owner</td><td>Next set of functionality from roadmap deemed valuable to release; defines what ships to customers in the near term</td><td>Mid-term boundary — specific functionality targeted for this release</td></tr><tr><td><strong>4. Product Backlog</strong></td><td>Tactical</td><td>Product Owner</td><td>Ordered to-do list of all requirements prioritised by business value and risk; higher items = more refined = more likely to be built</td><td>Project scope boundary — everything the product might become</td></tr><tr><td><strong>5. Sprint Backlog</strong></td><td>Operational</td><td>Development Team</td><td>Tasks required to create potentially shippable functionality for the sprint goal; includes sprint burndown chart</td><td>Immediate sprint boundary — the team's commitment for this sprint</td></tr><tr><td><strong>6. Increment</strong></td><td>Operational</td><td>Development Team</td><td>Fully developed, working, potentially-shippable functionality at end of each sprint; must meet DoD</td><td>Delivery boundary — what is releasable right now</td></tr></tbody></table><div class="callout callout-green"><div class="callout-title">Hierarchy of the 6 Artifacts</div><ul><li>Vision → Roadmap → Release Plan → Product Backlog → Sprint Backlog → Increment</li><li>Each artifact is a progressive refinement of the one above it.</li><li>Vision = months/years out (aspirational). Increment = done now (concrete).</li><li>PO owns artifacts 1-4. Dev Team owns artifacts 5-6. SM ensures the process works for all.</li><li>Exam tip: Product Roadmap = high-level functional areas. Product Backlog = detailed, ordered user stories.</li></ul></div>
  
  <h2 class="content-h2" id="cert-comparison">Certification Comparison: PMI-ACP vs CSM vs PMP vs CAPM</h2>
  <p class="content-p">From the PrepCast study guide — a complete comparison to understand how PMI-ACP positions relative to other common certifications.</p>
  <table class="content-table"><thead><tr><th>Criterion</th><th>PMI-ACP</th><th>CSM (Scrum Alliance)</th><th>PMP</th><th>CAPM</th></tr></thead><tbody><tr><td>Focus</td><td>Agile methods: Scrum, Kanban, Lean, XP, SAFe, DSDM, Crystal, FDD</td><td>Scrum only</td><td>Predictive + hybrid project management</td><td>Predictive project management (entry-level)</td></tr><tr><td>Experience required?</td><td>Yes — agile project experience</td><td>No</td><td>Yes — project management experience</td><td>No (if training hours met)</td></tr><tr><td>Education requirement</td><td>High school diploma + 21 hrs agile training</td><td>16-hour Scrum training course</td><td>High school diploma + 35 hrs PM training</td><td>High school diploma + 23 hrs PM training</td></tr><tr><td>Agile experience</td><td>1,500 hrs on agile projects (last 3 years)</td><td>Not required</td><td>Varies (hybrid experience accepted)</td><td>Not required</td></tr><tr><td>General project experience</td><td>2,000 hrs on project teams (last 5 years)</td><td>Not required</td><td>3+ years (degree) or 5+ years (high school)</td><td>Not required</td></tr><tr><td>Exam</td><td>120 questions, 3 hours, scenario-based</td><td>Online exam ~50 questions (after CSM training)</td><td>180 questions, ~4 hours</td><td>150 questions, 3 hours</td></tr><tr><td>Exam fee (non-member)</td><td>$495</td><td>Included in course fee (typically $1,000-$2,000)</td><td>$555</td><td>$300</td></tr><tr><td>Renewal</td><td>30 PDUs / 3 years</td><td>20 SEUs + $100 / 2 years</td><td>60 PDUs / 3 years</td><td>15 PDUs / 3 years (after 5 years becomes CAPM permanent)</td></tr><tr><td>Scope of agile coverage</td><td>Broad — all major frameworks</td><td>Narrow — Scrum only</td><td>Mixed — predictive + some agile</td><td>Predictive focus</td></tr><tr><td>Recognition</td><td>Global, multi-industry</td><td>Strong in tech/software companies</td><td>Gold standard globally for PM</td><td>Entry-level globally</td></tr><tr><td>Best for</td><td>Experienced agile practitioners wanting broad certification</td><td>New to Scrum; ScrumMaster role focus</td><td>Experienced PMs; diverse industries</td><td>New to project management</td></tr></tbody></table><div class="callout callout-blue"><div class="callout-title">PMI-ACP vs CSM: When to Choose Which</div><ul><li>Choose <strong>PMI-ACP</strong> if: you have 1-2+ years of agile experience, work across multiple frameworks (not just Scrum), want a globally recognised credential that validates real experience.</li><li>Choose <strong>CSM</strong> if: you are new to Scrum, need to get certified quickly (2-day course), primarily work in Scrum teams, or need a credential to get a Scrum Master role.</li><li>Many practitioners do both: CSM first to enter the field, PMI-ACP later to demonstrate breadth.</li><li>If you already hold <strong>PMP</strong>: PMP holders satisfy the experience requirement for PMI-ACP and only need to show 21 training hours. Very cost-effective add-on.</li><li>The PMI-ACP exam fee is $435 (member) / $495 (non-member). PMI membership ($129) pays for itself.</li></ul></div>
  
  <h2 class="content-h2" id="sample-questions-15">15 Sample Questions (PrepCast Style)</h2>
  <p class="content-p">These 15 questions represent the style and difficulty of the PrepCast free sample questions and the actual PMI-ACP exam. All are scenario-based. Read each carefully — apply agile mindset, not process memory.</p>

  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q1. A team's sprint velocity has been declining for three consecutive sprints. The Scrum Master notices team members seem disengaged in the daily standup. What should the Scrum Master do FIRST?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: C)</strong> Facilitate a retrospective to surface the root cause with the team<br><br>
      <em style="color:#374151;font-size:0.9em">Root cause before action. The SM's role is facilitation, not diagnosis. The team surfaces its own issues through retrospectives. Option A (reassign work) = command-and-control. Option B (tell team to be more engaged) = directive, not servant leadership. Option D (report to management) = escalates too early.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q2. During sprint planning, the development team says they can only commit to 6 of the 8 highest-priority stories. The Product Owner insists all 8 must be completed this sprint. What is the correct action?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: B)</strong> The team's sprint commitment stands; the PO cannot override it<br><br>
      <em style="color:#374151;font-size:0.9em">The Development Team owns the Sprint Backlog and decides how much work to pull into a sprint. The PO prioritises the Product Backlog but cannot dictate the sprint capacity. Forcing the team to over-commit destroys psychological safety and violates sustainable pace (Principle #8).</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q3. Your Kanban team's cumulative flow diagram shows the 'In Progress' band widening over the past two weeks while 'Done' stays flat. What does this indicate?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: A)</strong> Work is piling up in progress faster than it is being completed — there is a bottleneck downstream<br><br>
      <em style="color:#374151;font-size:0.9em">A widening 'In Progress' band in a CFD means work enters the column faster than it exits. The team is starting more than they finish. Solution: stop starting, start finishing. Investigate the downstream bottleneck (testing? code review?) and resolve it before pulling new work.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q4. A newly formed agile team is experiencing significant conflict about working practices and roles. Members are questioning each other's competence. Which Tuckman stage best describes this?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: B)</strong> Storming<br><br>
      <em style="color:#374151;font-size:0.9em">Storming = conflict, role contestation, questioning. The SM should coach through conflict, not resolve it for the team. This is normal and necessary — teams that skip Storming often have suppressed conflict that surfaces later. Norming follows when the team establishes working agreements.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q5. An agile project has CPI = 0.82 and SPI = 0.91. What is the most accurate assessment?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: D)</strong> The project is both over budget and behind schedule<br><br>
      <em style="color:#374151;font-size:0.9em">CPI < 1.0 = over budget (getting less value per dollar spent). SPI < 1.0 = behind schedule. Both indices below 1.0 is a serious situation. EAC should be recalculated and recovery options discussed with the team. Do not simply accelerate — diagnose the root cause first.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q6. A stakeholder requests a significant feature addition mid-sprint. The team has already committed to the sprint goal. What should happen?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: C)</strong> Add the item to the Product Backlog for prioritisation in a future sprint, unless the sprint goal is no longer valid<br><br>
      <em style="color:#374151;font-size:0.9em">Mid-sprint scope changes are handled through the Product Backlog, not by inserting into the current Sprint Backlog. The only exception: if the new feature makes the sprint goal irrelevant, the Sprint can be cancelled by the PO. The SM protects the team from mid-sprint disruption.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q7. Which estimation technique is MOST appropriate when sizing a large backlog of 80+ user stories quickly?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: B)</strong> Affinity estimation<br><br>
      <em style="color:#374151;font-size:0.9em">Affinity estimation (also called affinity mapping) groups stories by relative size quickly — ideal for large backlogs. Planning poker is too time-consuming at scale. T-shirt sizing is similar to affinity but less structured. Ideal hours require detailed decomposition. For 80+ stories in a single session, affinity estimation is the PrepCast-recommended technique.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q8. According to Lean principles, a team should 'decide as late as possible.' What does this mean?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: A)</strong> Defer irreversible decisions until the last responsible moment to keep options open<br><br>
      <em style="color:#374151;font-size:0.9em">Deciding late ≠ deciding late lazily. It means making decisions when you have the most information, just before the decision becomes irreversible. This reduces waste from rework when early decisions prove wrong. It does NOT mean procrastinating — the 'last responsible moment' is a specific deadline.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q9. A Crystal Clear team of 5 co-located developers is transitioning to Crystal Orange as the project grows to 25 people. What is the primary reason for this change?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: C)</strong> Crystal colour is selected based on team size and system criticality — larger teams require more process<br><br>
      <em style="color:#374151;font-size:0.9em">Crystal is a family chosen by size and criticality. Crystal Clear (1-6) has minimal process. Crystal Orange (21-40) requires more formalisation, defined roles, and integration workshops. The people-centric values remain constant — only the amount of ceremony changes as coordination complexity increases.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q10. In SAFe, what is the PRIMARY purpose of PI Planning?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: B)</strong> To align all ART teams to a shared mission and create a program-level plan for the next Program Increment<br><br>
      <em style="color:#374151;font-size:0.9em">PI Planning is the heartbeat of SAFe. All teams in the ART plan together face-to-face (or virtually) for 2 days. Output: team iteration plans + program board showing dependencies + risks. It creates alignment, surfaces cross-team dependencies, and builds a shared commitment across the entire train.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q11. A Scrum Master is coaching a team that consistently marks stories as 'Done' after coding, before testing and review. What is the correct intervention?</strong></div>
    <div style="margin-top:10px;font-size:0.85em;color:#64748b;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Click to reveal answer</div>
    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">
      <strong style="color:#166534">Answer: D)</strong> Facilitate the team to strengthen their Definition of Done to include testing and review<br><br>
      <em style="color:#374151;font-size:0.9em">A weak DoD creates hidden inventory of partially-complete work. The SM facilitates — they do not dictate the DoD, but they help the team see the consequences. 'Done' must mean potentially shippable. Stories that pass coding but fail testing are NOT done — they are in progress.</em>
    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">
    <div class="qa-question"><strong>Q12. During a retrospective, the team identifies that unclear acceptance criteria have caused rework in the last three sprints. Using the DSDM approach, what practice would MOST directly address this?</strong></div>

  <div class="qa-block" style="margin-bottom:16px">

    </div>
  </div>
  <div class="qa-block" style="margin-bottom:16px">

    <div style="display:none;margin-top:8px;padding:12px;background:#f0fdf4;border-left:3px solid #22c55e;border-radius:4px">

      <em style="color:#374151;font-size:0.9em">TDD and Refactoring form the Red-Green-Refactor cycle: write a failing test (Red), write minimum code to pass it (Green), then improve the code structure without changing behaviour (Refactor). This cycle continuously improves design quality while maintaining test coverage. Pair programming complements this but the design quality engine is TDD + Refactoring.</em>

const searchIndex = [];
function buildSearchIndex() {
  SECTIONS.forEach(sec => {
    const content = renderSection(sec.id);
    const div = document.createElement('div');
    div.innerHTML = content;
    // Index subsections
    sec.subsections.forEach(sub => {
      const el = div.querySelector(`#${sub.id}`);
      if (el) {
        let text = '';
        let node = el.nextElementSibling;
        while (node && !['H2'].includes(node.tagName)) {
          text += ' ' + (node.textContent || '');
          node = node.nextElementSibling;
        }
        searchIndex.push({ sectionId: sec.id, sectionTitle: sec.title, subId: sub.id, title: sub.title, text: text.trim().slice(0, 500) });
      }
    });
    // Also index the whole section
    searchIndex.push({ sectionId: sec.id, sectionTitle: sec.title, subId: null, title: sec.title, text: div.textContent.slice(0, 1000) });
  });
}

let currentSection = 'overview';
let visitedSections = new Set();
const contentCache = {};

function navigateTo(sectionId, subId) {
  // Update current section
  currentSection = sectionId;
  visitedSections.add(sectionId);

  // Render content (cached)
  if (!contentCache[sectionId]) {
    contentCache[sectionId] = renderSection(sectionId);
  }

  // Show content
  const content = document.getElementById('content');
  content.innerHTML = contentCache[sectionId];

  // Make QA interactive
  initQA();

  // Scroll to sub-section if specified
  if (subId) {
    setTimeout(() => {
      const el = document.getElementById(subId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  } else {
    content.closest('#main').scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Update sidebar active states
  document.querySelectorAll('.section-header').forEach(h => h.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const activeHeader = document.querySelector(`.section-header[data-sec="${sectionId}"]`);
  if (activeHeader) activeHeader.classList.add('active');
  if (subId) {
    const activeItem = document.querySelector(`.nav-item[data-sub="${subId}"]`);
    if (activeItem) activeItem.classList.add('active');
  }

  // Update progress
  updateProgress();

  // URL update skipped (sandbox-safe)
}

function updateProgress() {
  const total = SECTIONS.length;
  const pct = Math.round((visitedSections.size / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

  const nav = document.getElementById('sidebar-nav');

        `).join('')}
      </div>

  `).join('');
}

function toggleSection(secId, header) {
  const items = document.getElementById(`items-${secId}`);
  const isOpen = items.classList.contains('open');

  // Close all
  document.querySelectorAll('.section-items').forEach(i => i.classList.remove('open'));
  document.querySelectorAll('.section-header').forEach(h => h.classList.remove('open'));

  if (!isOpen) {
    items.classList.add('open');
    header.classList.add('open');
    navigateTo(secId, null);
  } else {
    navigateTo(secId, null);
  }
}

function selectOpt(el, num, letter, answer) {
  const block = el.closest('.qa-block');
  block.querySelectorAll('.qa-option').forEach(o => {

    if (o.dataset.letter === answer) o.classList.add('correct');

function highlightText(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

    ).slice(0, 5);
    document.getElementById('search-results-count').textContent =
      results.length ? `${results.length} result${results.length > 1 ? 's' : ''} found` : 'No results';
    if (results.length === 1) navigateTo(results[0].sectionId, results[0].subId);
  }, 300);
});

document.getElementById('search-box').addEventListener('keydown', e => {
  if (e.key === 'Enter') openSearchOverlay(e.target.value);
  if (e.key === 'Escape') e.target.blur();
});

function openSearchOverlay(initialQuery = '') {
  const overlay = document.getElementById('search-overlay');
  overlay.classList.add('active');
  const input = document.getElementById('search-modal-input');
  input.value = initialQuery;
  input.focus();
  if (initialQuery) performModalSearch(initialQuery);
}

document.getElementById('search-modal-input').addEventListener('input', e => {
  performModalSearch(e.target.value);
});
document.getElementById('search-modal-input').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSearchOverlay();
});
document.getElementById('search-close-btn').addEventListener('click', closeSearchOverlay);
document.getElementById('search-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('search-overlay')) closeSearchOverlay();
});

function closeSearchOverlay() {
  document.getElementById('search-overlay').classList.remove('active');
}

function performModalSearch(query) {
  const resultsDiv = document.getElementById('search-modal-results');
  if (!query.trim()) { resultsDiv.innerHTML = '<div class="no-results">Type to search...</div>'; return; }

  const results = searchIndex.filter(item =>
    item.title.toLowerCase().includes(query.toLowerCase()) ||
    item.text.toLowerCase().includes(query.toLowerCase())
  ).slice(0, 12);

  if (!results.length) {
    resultsDiv.innerHTML = '<div class="no-results">No results found. Try different keywords.</div>';
    return;
  }

  resultsDiv.innerHTML = results.map((r, i) => {
    const preview = r.text.slice(0, 160);
    return `<div class="search-result-item" onclick="selectSearchResult('${r.sectionId}','${r.subId || ''}')">
      <div class="search-result-section">${r.sectionTitle}</div>
      <div class="search-result-title">${highlightText(r.title, query)}</div>
      <div class="search-result-preview">${highlightText(preview, query)}...</div>
    </div>`;
  }).join('');
}

function selectSearchResult(sectionId, subId) {
  closeSearchOverlay();
  navigateTo(sectionId, subId || null);
  document.getElementById('search-box').value = '';
}

// Keyboard shortcut: Ctrl+K or Cmd+K to open search
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    openSearchOverlay();
  }
});

// Acronym filter
function filterAcronyms(query) {
  const rows = document.querySelectorAll('#acronym-table tbody tr');
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
  });
}

// ── INIT ────────────────────────────────────────────────
buildSidebar();
buildSearchIndex();
navigateTo('overview', null);
// Open first section
const firstItems = document.getElementById('items-overview');
if (firstItems) firstItems.classList.add('open');
const firstHeader = document.querySelector('.section-header[data-sec="overview"]');
if (firstHeader) firstHeader.classList.add('open');
</script>
