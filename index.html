function renderTools() {
  return `
  <div class="section-hero">
    <div class="hero-eyebrow">Section 6</div>
    <div class="hero-title">Tools & Techniques</div>
    <div class="hero-subtitle">Estimation techniques, retrospective formats, information radiators, release planning, and continuous improvement. The practical toolkit every agile practitioner uses daily.</div>
    <div class="hero-stats">
      <div class="hero-stat"><span class="hero-stat-val">5+</span><div class="hero-stat-label">Estimation Tools</div></div>
      <div class="hero-stat"><span class="hero-stat-val">8+</span><div class="hero-stat-label">Retro Formats</div></div>
      <div class="hero-stat"><span class="hero-stat-val">7+</span><div class="hero-stat-label">Info Radiators</div></div>
    </div>
  </div>

  <h2 class="content-h2" id="estimation">Estimation Techniques — Complete Guide</h2>
  <p class="content-p">Agile estimation is fundamentally different from traditional estimation. Instead of estimating in hours or days, most agile teams use relative estimation — comparing stories to each other, not to an absolute time scale. This produces more consistent results because humans are much better at comparing two things than predicting absolute durations.</p>

  <h3 class="content-h3">Why Relative Estimation Works</h3>
  ${table(["Problem with Absolute Estimation", "How Relative Estimation Solves It"], [
    ["People are terrible at predicting hours for complex work", "Comparing relative complexity is much more accurate (is this bigger or smaller than that?)"],
    ["Estimates in hours create false precision and accountability pressure", "Story points are abstract — they reduce sandbagging and anchor-hunting"],
    ["Different developers have very different speeds", "Velocity (points per sprint) naturally calibrates to the team's actual speed"],
    ["Estimates become commitments, not forecasts", "Points are planning tools; velocity converts them to time forecasts probabilistically"],
  ])}

  <h3 class="content-h3">Planning Poker — Complete Mechanics</h3>
  <p class="content-p">Planning Poker is the most widely used agile estimation technique. It combines expert judgment with structured group discussion to produce well-calibrated relative estimates.</p>
  ${table(["Card Value", "What It Means"], [
    ["0", "The story is already done OR is trivially small (less than an hour)"],
    ["1/2", "Very small — a few hours of work"],
    ["1", "Very small — about a day"],
    ["2", "Small — 1-2 days"],
    ["3", "Small-medium — 2-3 days"],
    ["5", "Medium — about half a sprint for one developer"],
    ["8", "Large — close to a full sprint for one developer; consider splitting"],
    ["13", "Very large — likely an epic; should be split before sprinting"],
    ["20", "Epic — definitely split this into multiple stories"],
    ["40/100", "Extremely large — needs significant decomposition before estimating"],
    ["?", "I do not understand this story well enough to estimate it"],
    ["☕", "I need a break — the session has been going too long"],
  ])}
  ${callout("blue", "📝 Planning Poker Process", [
    "1. PO reads the story and answers clarifying questions from the team",
    "2. Each team member silently selects a card (no discussion yet)",
    "3. All cards are revealed simultaneously — prevents anchoring on others' estimates",
    "4. If all estimates agree (or are within 1 range): accept the estimate",
    "5. If estimates diverge: the HIGHEST and LOWEST estimators explain their reasoning",
    "6. Discuss the reasons for divergence — often reveals hidden complexity or assumptions",
    "7. Estimate again. Repeat until convergence (usually 2-3 rounds max)",
    "KEY: Simultaneous reveal is critical. Any sequential reveal anchors everyone to the first number shown."
  ])}

  <h3 class="content-h3">Fibonacci Sequence in Estimation</h3>
  <p class="content-p">Planning Poker typically uses a modified Fibonacci sequence (1, 2, 3, 5, 8, 13, 20, 40, 100) rather than linear numbers. The increasing gaps between values reflect the fundamental uncertainty of estimating larger work — the difference between an 8-point story and a 13-point story is meaningful, but the difference between a 100-point and a 97-point story is not. Using Fibonacci forces teams to acknowledge that large items are inherently imprecise.</p>

  <h3 class="content-h3">All Estimation Techniques Compared</h3>
  ${table(["Technique", "How It Works", "Team Size", "Speed", "Accuracy", "Best For"], [
    ["<strong>Planning Poker</strong>", "Cards revealed simultaneously; discuss outliers; converge", "5-9", "Medium", "High", "Sprint planning; detailed story sizing"],
    ["<strong>T-Shirt Sizing</strong>", "Relative sizes: XS/S/M/L/XL/XXL", "Any", "Fast", "Moderate", "Large backlogs; early release planning; stakeholder communication"],
    ["<strong>Affinity Estimation</strong>", "Team silently sorts stories left→right by size; assign ranges", "Any", "Very fast", "Moderate", "Very large backlogs (50+ stories); initial backlog ordering"],
    ["<strong>PERT (3-Point)</strong>", "(O + 4×ML + P) ÷ 6 for expected duration", "Individual", "Slow", "High (for duration)", "When time estimates are needed for scheduling or contractual purposes"],
    ["<strong>Spike</strong>", "Time-boxed (1-4 day) research sprint", "1-2 devs", "Varies", "N/A (not an estimate)", "Unknown technology; unclear requirements preventing estimation"],
    ["<strong>Relative Mass Valuation</strong>", "Sort all stories into a line from smallest to largest as a group activity", "Any", "Fast", "Moderate", "Large backlogs; team alignment on relative sizes"],
  ])}

  <h2 class="content-h2" id="retro-formats">Retrospective Formats — 8 Techniques</h2>
  <p class="content-p">The sprint retrospective is the team's most powerful continuous improvement mechanism — but only if it produces new insights rather than the same discussion every sprint. Rotating formats prevents fatigue, surfaces different aspects of team dynamics, and keeps retrospectives fresh and engaging.</p>

  ${table(["Format", "Structure", "Best Used When", "Time Needed"], [
    ["<strong>Start / Stop / Continue</strong>", "What should we start doing? Stop doing? Continue doing?", "Regular cadence retrospective; any team stage; quick and familiar format", "30-45 min"],
    ["<strong>4 Ls (Liked, Learned, Lacked, Longed For)</strong>", "What did we like? Learn? Lack? Long for?", "End of release or milestone; when emotional reflection is valuable", "45-60 min"],
    ["<strong>5 Whys</strong>", "State a problem. Ask WHY 5 times to reach root cause.", "Recurring problems with unclear root cause; process breakdowns", "45-60 min"],
    ["<strong>Sailboat / Speedboat</strong>", "Wind = what pushes us forward; Anchors = what slows us down; Rocks = risks ahead; Island = our goal", "Mid-project; visualizing multiple perspectives simultaneously", "45-60 min"],
    ["<strong>Mad / Sad / Glad</strong>", "Team shares what made them mad, sad, or glad this sprint", "Team building; surfacing emotional undercurrents; after difficult sprint", "30-45 min"],
    ["<strong>Lean Coffee</strong>", "Write topics on stickies; dot-vote; time-boxed discussion of highest-voted topics", "Teams wanting democratic, emergent retrospective topics with no preset agenda", "45-60 min"],
    ["<strong>Timeline</strong>", "Place sprint events chronologically; annotate with + and - feelings at each point", "Longer sprints; complex sprints with many events; distributed teams using digital tools", "60-75 min"],
    ["<strong>ORID (Focused Conversation)</strong>", "Objective → Reflective → Interpretive → Decisional — structured progression through facts, feelings, meaning, and action", "Deep retrospectives; complex team dynamics; after difficult incidents or failures", "60-90 min"],
  ])}

  ${callout("green", "✅ Retrospective Best Practices", [
    "ALWAYS follow up on previous sprint's action items at the start of each retro",
    "Limit to 1-3 improvement actions per sprint — more than 3 and nothing gets done",
    "Add improvement actions to the sprint backlog as real stories — not a separate list",
    "Rotate facilitation among team members to build facilitation skills and ownership",
    "Change the format every 2-3 sprints to prevent fatigue and surface new insights",
    "Safety check at start (anonymous 1-5 scale): are people comfortable sharing honestly?",
    "NEVER have the Scrum Master report retrospective outcomes to management — psychological safety depends on confidentiality"
  ])}

  <h2 class="content-h2" id="info-radiators">Information Radiators — Complete Guide</h2>
  <p class="content-p">Information radiators are large, visible displays of project information that team members and stakeholders can read at a glance without asking anyone. They are a core agile transparency practice. The key principle: information should require no effort to access — it should be impossible to miss.</p>

  ${table(["Radiator", "What It Shows", "Who Benefits", "Update Frequency"], [
    ["<strong>Scrum / Task Board</strong>", "Stories + tasks in columns: To Do, In Progress, Done. Assignments, story status visible at sprint level.", "Development Team, SM, PO, any visitor", "Daily (updated in or after standup)"],
    ["<strong>Burndown Chart</strong>", "Daily remaining work (story points or hours) plotted against ideal burndown line for the sprint.", "Development Team, SM, PO", "Daily"],
    ["<strong>Burnup Chart</strong>", "Completed work line vs. total scope line. Scope changes visible when scope line moves up or down.", "PO, Stakeholders, Development Team", "Daily or per sprint"],
    ["<strong>Kanban Board</strong>", "All workflow stages with WIP limits. Current items in each stage visible. Bottlenecks immediately visible.", "Development Team, SM", "Real-time (updated as items move)"],
    ["<strong>Cumulative Flow Diagram</strong>", "Quantity of work in each workflow state over time. Widening bands = bottlenecks.", "SM, Kanban team, management", "Daily"],
    ["<strong>Velocity Chart</strong>", "Story points completed per sprint over time. Shows trend, stability, and forecasting baseline.", "SM, PO, team, management", "Per sprint"],
    ["<strong>Risk Burndown Chart</strong>", "Total risk exposure (probability × impact) tracked over sprint iterations.", "SM, PO, Stakeholders", "Per sprint or bi-weekly"],
    ["<strong>Release Roadmap / Feature Timeline</strong>", "High-level plan showing feature themes targeted per release over 3-6 month horizon.", "Stakeholders, PO, Executives", "Per sprint review or monthly"],
    ["<strong>Build / CI Dashboard</strong>", "Latest build status: passing/failing. Test coverage %. Deployment pipeline status.", "Development Team, DevOps", "Real-time"],
  ])}

  <h2 class="content-h2" id="continuous-improvement">Continuous Improvement Practices</h2>
  <p class="content-p">Beyond retrospectives, high-performing agile organizations build a culture of continuous improvement into every aspect of their operations. These practices originate from Lean and Toyota Production System thinking.</p>

  ${table(["Practice", "Origin", "Description", "Agile Application"], [
    ["<strong>Kaizen</strong>", "Toyota / Lean", "Japanese for 'change for better.' Small, incremental improvements made continuously by everyone, every day.", "Sprint retrospectives as structured kaizen events. Team members suggesting micro-improvements in daily work."],
    ["<strong>Gemba Walk</strong>", "Lean Manufacturing", "Leaders visit the actual place where work happens to observe, learn, and understand the real process.", "Agile coach observing team standups, refinement sessions, and working sessions to understand actual practices vs. stated practices."],
    ["<strong>PDCA Cycle</strong>", "W. Edwards Deming", "Plan → Do → Check → Act. Scientific approach to improvement experiments.", "Retrospective action items use PDCA: plan improvement → try for 1 sprint → check results → decide to keep, modify, or discard"],
    ["<strong>5S Methodology</strong>", "Toyota", "Sort, Set in order, Shine, Standardize, Sustain — organized, clean workspace.", "In software: organized codebases, clean backlogs, standardized DoD, sustainable practices"],
    ["<strong>Root Cause Analysis</strong>", "Quality Management", "Systematically identify the fundamental cause of a problem, not just symptoms.", "5 Whys retrospectives; fishbone (Ishikawa) diagrams for complex production incidents"],
    ["<strong>Value Stream Mapping</strong>", "Lean", "Diagram all steps in a workflow including wait times to identify waste and improvement opportunities.", "Map the full software delivery pipeline: idea → development → testing → deployment. Identify delays and non-value-adding steps."],
  ])}
  `;
}

function renderFormulas() {
  return `
  <div class="section-hero">
    <div class="hero-eyebrow">Section 7</div>
    <div class="hero-title">Formulas & Calculations</div>
    <div class="hero-subtitle">Velocity forecasting, EVM (9 formulas), PERT 3-point estimation, Little's Law. While PMI-ACP is primarily scenario-based, 5-10% of questions may involve calculations.</div>
    <div class="hero-stats">
      <div class="hero-stat"><span class="hero-stat-val">9</span><div class="hero-stat-label">EVM Formulas</div></div>
      <div class="hero-stat"><span class="hero-stat-val">2</span><div class="hero-stat-label">PERT Formulas</div></div>
      <div class="hero-stat"><span class="hero-stat-val">3</span><div class="hero-stat-label">Velocity Formulas</div></div>
    </div>
  </div>

  <h2 class="content-h2" id="velocity-formulas">Velocity & Sprint Forecasting</h2>
  <p class="content-p">Velocity is the team's primary planning and forecasting tool. It is NOT a performance metric or productivity measure — it is a calibration baseline for making reliable delivery predictions. Velocity is team-specific and context-specific; comparing velocity across teams is meaningless and harmful.</p>

  <div class="formula-card">
    <div class="formula-name">Average Velocity</div>
    <div class="formula-expr">Avg Velocity = Total story points completed ÷ Number of sprints measured</div>
    <div class="formula-note">Use last 3-5 sprints. Exclude outlier sprints (holidays, major disruptions). Example: (38+44+42+36+40) ÷ 5 = 40 pts/sprint</div>
  </div>

  <div class="formula-card">
    <div class="formula-name">Sprints Remaining</div>
    <div class="formula-expr">Sprints needed = Total remaining story points ÷ Average velocity</div>
    <div class="formula-note">ALWAYS round UP. Example: 210 pts ÷ 40 velocity = 5.25 → 6 sprints. Rounding down would over-promise delivery.</div>
  </div>

  <div class="formula-card">
    <div class="formula-name">Team Capacity</div>
    <div class="formula-expr">Capacity (hours) = Team size × Sprint days × Hours/day × Focus factor</div>
    <div class="formula-note">Focus factor = 0.70-0.80 (accounts for meetings, admin, interruptions). Example: 6 people × 10 days × 8 hrs × 0.75 = 360 hours available.</div>
  </div>

  <div class="formula-card">
    <div class="formula-name">Release Date Forecast</div>
    <div class="formula-expr">Release date = Today + (Sprints needed × Sprint length in weeks)</div>
    <div class="formula-note">This is a single-point estimate (50th percentile). For range forecasting, use Monte Carlo simulation or add buffer (typically 10-20% for uncertainty).</div>
  </div>

  <h3 class="content-h3">Velocity Calculation — Worked Examples</h3>
  ${table(["Sprint", "Points Committed", "Points Completed", "Notes"], [
    ["Sprint 1", "42", "35", "Team was new; still calibrating (exclude or use cautiously)"],
    ["Sprint 2", "40", "40", "Full sprint, no holidays"],
    ["Sprint 3", "44", "38", "One developer sick for 2 days"],
    ["Sprint 4", "40", "42", "Team exceeded — pulled in extra item"],
    ["Sprint 5", "42", "40", "Normal sprint"],
    ["<strong>Average (S2-S5)</strong>", "-", "<strong>40</strong>", "Exclude Sprint 1 as outlier for new team"],
  ])}
  ${callout("amber", "⚠️ Velocity Anti-Patterns — Exam Awareness", [
    "WRONG: Using velocity as a performance metric to compare teams",
    "WRONG: Requiring velocity to increase every sprint — this creates gaming",
    "WRONG: Adding story points mid-sprint to 'save' failing velocity",
    "WRONG: Management setting velocity targets ('you must do 50 points per sprint')",
    "RIGHT: Using velocity trend for forecasting only",
    "RIGHT: Investigating declining velocity for root causes (not blaming)",
    "RIGHT: Accepting that velocity varies naturally by ±10-15% sprint to sprint"
  ])}

  <h2 class="content-h2" id="evm">Earned Value Management (EVM) — Complete Guide</h2>
  <p class="content-p">EVM is a quantitative project performance measurement system that integrates scope, schedule, and cost. While traditionally associated with waterfall projects, EVM is tested on the PMI-ACP exam because it can be applied to agile projects — treating story points as the "work" being earned.</p>

  <h3 class="content-h3">Core EVM Variables</h3>
  ${table(["Variable", "Name", "Definition"], [
    ["<strong>BAC</strong>", "Budget at Completion", "Total planned budget for the entire project"],
    ["<strong>PV</strong>", "Planned Value", "Budgeted value of work PLANNED to be done by this date. PV = planned % complete × BAC"],
    ["<strong>EV</strong>", "Earned Value", "Budgeted value of work ACTUALLY completed. EV = actual % complete × BAC"],
    ["<strong>AC</strong>", "Actual Cost", "Actual money spent to date. What you actually paid."],
  ])}

  <h3 class="content-h3">EVM Formulas — All 9</h3>
  <div class="formula-card">
    <div class="formula-name">CV — Cost Variance</div>
    <div class="formula-expr">CV = EV − AC</div>
    <div class="formula-note">Positive CV = under budget. Negative CV = over budget. Example: EV $80K − AC $110K = -$30K (OVER BUDGET by $30K)</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">SV — Schedule Variance</div>
    <div class="formula-expr">SV = EV − PV</div>
    <div class="formula-note">Positive SV = ahead of schedule. Negative SV = behind schedule. Example: EV $80K − PV $100K = -$20K (BEHIND SCHEDULE)</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">CPI — Cost Performance Index</div>
    <div class="formula-expr">CPI = EV ÷ AC</div>
    <div class="formula-note">Greater than 1.0 = under budget (efficient). Less than 1.0 = over budget. CPI = 0.73 means spending $1.37 per $1 of value earned.</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">SPI — Schedule Performance Index</div>
    <div class="formula-expr">SPI = EV ÷ PV</div>
    <div class="formula-note">Greater than 1.0 = ahead of schedule. Less than 1.0 = behind. SPI = 0.80 means only completing 80 cents of work for every $1 planned.</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">EAC — Estimate at Completion</div>
    <div class="formula-expr">EAC = BAC ÷ CPI</div>
    <div class="formula-note">Forecasted total cost if current efficiency continues. Example: BAC $200K ÷ CPI 0.73 = $274K forecast (project will cost $274K total if trend continues).</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">ETC — Estimate to Complete</div>
    <div class="formula-expr">ETC = EAC − AC</div>
    <div class="formula-note">How much money is still needed to finish. Example: EAC $274K − AC $110K = $164K still needed to complete.</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">VAC — Variance at Completion</div>
    <div class="formula-expr">VAC = BAC − EAC</div>
    <div class="formula-note">How much over/under budget you will be at the end. Positive = under budget. Negative = over budget. Example: $200K − $274K = -$74K (will be $74K over budget).</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">TCPI — To-Complete Performance Index</div>
    <div class="formula-expr">TCPI = (BAC − EV) ÷ (BAC − AC)</div>
    <div class="formula-note">CPI efficiency needed for REMAINING work to meet original BAC. Greater than 1.0 = must improve efficiency. Less than 1.0 = have room to be less efficient.</div>
  </div>

  <h3 class="content-h3">EVM Complete Worked Example</h3>
  ${callout("navy", "📊 EVM Example — Step by Step", [
    "<strong>Given:</strong> BAC = $300,000. Project is 50% through planned schedule. 40% of work actually complete. Spent $150,000.",
    "",
    "PV = 50% × $300,000 = $150,000",
    "EV = 40% × $300,000 = $120,000",
    "AC = $150,000 (given)",
    "",
    "CV = EV − AC = $120K − $150K = −$30,000 (OVER BUDGET by $30K)",
    "SV = EV − PV = $120K − $150K = −$30,000 (BEHIND SCHEDULE by $30K equivalent)",
    "CPI = EV ÷ AC = $120K ÷ $150K = 0.80 (spending $1.25 per $1 of value — 20% over budget)",
    "SPI = EV ÷ PV = $120K ÷ $150K = 0.80 (completing only 80% of planned work)",
    "EAC = BAC ÷ CPI = $300K ÷ 0.80 = $375,000 (forecasted final cost)",
    "ETC = EAC − AC = $375K − $150K = $225,000 (still needed to finish)",
    "VAC = BAC − EAC = $300K − $375K = −$75,000 (will be $75K over budget)"
  ])}

  <h2 class="content-h2" id="pert">PERT — Three-Point Estimation</h2>
  <p class="content-p">PERT (Program Evaluation and Review Technique) uses three time estimates to produce a weighted average that accounts for estimation uncertainty. It is particularly useful when a single estimate would be misleading due to variability.</p>

  <div class="formula-card">
    <div class="formula-name">Expected Duration (te) — Weighted Average</div>
    <div class="formula-expr">te = (Optimistic + 4 × Most Likely + Pessimistic) ÷ 6</div>
    <div class="formula-note">Most Likely is weighted 4× because it is the most probable outcome. Example: (3 + 4×8 + 19) ÷ 6 = (3 + 32 + 19) ÷ 6 = 54 ÷ 6 = 9 days</div>
  </div>

  <div class="formula-card">
    <div class="formula-name">Standard Deviation (σ) — Uncertainty Range</div>
    <div class="formula-expr">σ = (Pessimistic − Optimistic) ÷ 6</div>
    <div class="formula-note">Measures the spread/uncertainty of the estimate. Example: (19 − 3) ÷ 6 = 16 ÷ 6 = 2.67 days. 68% confident the task takes 9 ± 2.67 days (6.3 to 11.7 days).</div>
  </div>

  <h3 class="content-h3">PERT Worked Example</h3>
  ${table(["Task", "Optimistic", "Most Likely", "Pessimistic", "Expected (te)", "Std Dev (σ)"], [
    ["Task A: Database design", "2 days", "5 days", "14 days", "(2+20+14)÷6 = 6 days", "(14-2)÷6 = 2 days"],
    ["Task B: API development", "5 days", "10 days", "21 days", "(5+40+21)÷6 = 11 days", "(21-5)÷6 = 2.7 days"],
    ["Task C: UI development", "3 days", "7 days", "17 days", "(3+28+17)÷6 = 8 days", "(17-3)÷6 = 2.3 days"],
    ["<strong>Total (serial)</strong>", "-", "-", "-", "<strong>25 days expected</strong>", "~4 days combined uncertainty"],
  ])}

  <h2 class="content-h2" id="kanban-formulas">Kanban Metrics & Little's Law</h2>

  <div class="formula-card">
    <div class="formula-name">Little's Law — Fundamental Kanban Formula</div>
    <div class="formula-expr">Cycle Time = WIP ÷ Throughput</div>
    <div class="formula-note">Where: WIP = items currently in progress; Throughput = items completed per unit time. Example: 10 items in WIP ÷ 2 items/day throughput = 5 days average cycle time.</div>
  </div>

  <p class="content-p">Little's Law has a profound practical implication: <strong>reducing WIP directly reduces cycle time</strong>, without requiring the team to work faster. If you want faster delivery, reduce the number of things in flight simultaneously. This is the mathematical foundation for Kanban WIP limits.</p>

  ${table(["Scenario", "WIP", "Throughput", "Cycle Time", "Action"], [
    ["Current state", "15 items", "3 items/day", "5 days", "—"],
    ["Reduce WIP by 33%", "10 items", "3 items/day", "3.3 days", "Simply stop starting new items when WIP is full"],
    ["WIP reduced further", "6 items", "3 items/day", "2 days", "Team now delivers in 2 days vs. original 5 days — without working faster"],
  ])}

  <div class="formula-card">
    <div class="formula-name">Throughput Rate</div>
    <div class="formula-expr">Throughput = Items completed ÷ Time period</div>
    <div class="formula-note">Example: Team completed 24 stories in 4 weeks = 6 stories/week throughput. Use for release forecasting in Kanban (instead of velocity).</div>
  </div>

  <div class="formula-card">
    <div class="formula-name">Cycle Time</div>
    <div class="formula-expr">Cycle Time = Date item completed − Date item started work</div>
    <div class="formula-note">Measures how long active work takes. Compare to Lead Time (includes waiting before work starts). Short, consistent cycle time = healthy workflow.</div>
  </div>

  <div class="formula-card">
    <div class="formula-name">Lead Time</div>
    <div class="formula-expr">Lead Time = Date item completed − Date item requested/created</div>
    <div class="formula-note">Measures total time from customer request to delivery. Includes waiting time before work starts. Lead Time ≥ Cycle Time always. The gap = queue wait time.</div>
  </div>

  <h2 class="content-h2" id="pert">Quick Formula Reference Card</h2>
  ${table(["Formula", "Expression", "Interpretation"], [
    ["Average Velocity", "Σ(pts/sprint) ÷ N sprints", "Sprint forecasting baseline"],
    ["Sprints Remaining", "Remaining pts ÷ Avg velocity", "Always round UP"],
    ["PERT Expected", "(O + 4M + P) ÷ 6", "Weighted average duration"],
    ["PERT Std Dev", "(P − O) ÷ 6", "Estimate uncertainty range"],
    ["CPI", "EV ÷ AC", ">1.0 good; <1.0 over budget"],
    ["SPI", "EV ÷ PV", ">1.0 good; <1.0 behind schedule"],
    ["CV", "EV − AC", "Positive = under budget"],
    ["SV", "EV − PV", "Positive = ahead of schedule"],
    ["EAC", "BAC ÷ CPI", "Forecasted total cost"],
    ["ETC", "EAC − AC", "Remaining budget needed"],
    ["VAC", "BAC − EAC", "Negative = will over-run"],
    ["WSJF", "Cost of Delay ÷ Job Size", "Higher = higher priority"],
    ["Little's Law", "Cycle Time = WIP ÷ Throughput", "Reduce WIP to reduce cycle time"],
  ])}
  `;
}

function renderQuestions() {
  const qData = [
    // MINDSET
    { id: 'q-mindset', section: 'Domain 1: Mindset Questions (Q1–Q25)', qs: [
      [1, "A project manager says, 'We won't need documentation in our agile project.' How should the agile coach respond?", ["A. Agree — agile eliminates all documentation","B. Explain that agile values working software OVER comprehensive documentation, but documentation still has value when it serves the team","C. Suggest using waterfall documentation alongside agile","D. Check with the PMO for documentation standards"], "B", "The Agile Manifesto says 'over' not 'instead of.' Documentation that serves the team is valuable. Eliminating ALL documentation is reckless, not agile."],
      [2, "A team member says 'we should build the reporting module now — we'll definitely need it in the future.' The PO is unsure. Which principle applies?", ["A. Principle 9: Continuous attention to technical excellence","B. Principle 10: Simplicity — the art of maximizing the work NOT done — is essential","C. Principle 3: Deliver working software frequently","D. Principle 2: Welcome changing requirements"], "B", "YAGNI (You Ain't Gonna Need It). Build only what's needed now. Building 'just in case' is over-production — a Lean waste."],
      [3, "Midway through a sprint, a competitor releases a product making 3 planned features obsolete. What should the Scrum Master do?", ["A. Allow immediate replacement since agile welcomes change","B. Refuse any changes — the sprint backlog is locked","C. Discuss with PO and team: if sprint goal is obsolete the sprint can be cancelled; otherwise reprioritize next sprint","D. Escalate to the project sponsor"], "C", "Agile welcomes change (Principle 2). A sprint can be cancelled ONLY by the PO when the sprint goal is no longer valid. Otherwise complete the sprint and reprioritize in the next one."],
      [4, "Which statement BEST describes the agile approach to upfront design?", ["A. All architecture must be fully designed before any development","B. Architecture is irrelevant — it emerges entirely from coding","C. Just enough upfront design is done to reduce risk, with architecture evolving as the team learns more","D. Architecture is always deferred until after the first release"], "C", "Agile supports 'just enough' architecture. Iteration 0 often does initial architecture work. Neither all-upfront nor none is the right answer."],
      [5, "A team is consistently working 60-hour weeks to meet sprint commitments and quality is declining. Which principle is being violated?", ["A. Principle 1: Early and continuous delivery of valuable software","B. Principle 7: Working software is the primary measure","C. Principle 8: Agile promotes sustainable development at a constant pace indefinitely","D. Principle 12: Reflect at regular intervals"], "C", "Sustained overtime leads to burnout, quality decline, and turnover. Principle 8 is the sustainable pace principle."],
      [6, "What does 'empirical process control' mean in agile?", ["A. Using detailed upfront plans to control outcomes","B. Making decisions based on observation and real data — inspect what's happening and adapt accordingly","C. Controlling projects through strict change management","D. Using mathematical models to predict outcomes"], "B", "Empirical = knowledge from experience. Decisions based on real observation (inspection), not plans. Scrum is built entirely on this concept."],
      [7, "The three pillars of Scrum are:", ["A. Sprint, Backlog, and Velocity","B. Transparency, Inspection, and Adaptation","C. Planning, Execution, and Retrospection","D. Product Owner, Scrum Master, and Development Team"], "B", "The three pillars of empirical process control underpinning Scrum: Transparency (everyone sees reality), Inspection (regularly examine), Adaptation (change when inspection reveals a problem)."],
      [8, "An organization needs extensive compliance documentation before any code is written. What is the best agile approach?", ["A. Refuse to use agile — it's incompatible with compliance","B. Apply agile delivery practices while creating required compliance documentation in parallel — tailor the approach","C. Eliminate all documentation requirements","D. Use waterfall for documentation and agile only for coding"], "B", "Agile can be tailored to regulated environments. Many healthcare IT and financial services teams use agile successfully with compliance documentation as part of the Definition of Done."],
    ]},
    // LEADERSHIP
    { id: 'q-leadership', section: 'Domain 2: Leadership Questions (Q26–Q55)', qs: [
      [26, "A new agile team is polite and cooperative but defers to the most senior developer. What Tuckman stage, and what should the SM do?", ["A. Performing — no action needed","B. Norming — team is establishing patterns","C. Forming — provide structure, set clear expectations, create safety for authentic communication","D. Storming — give more autonomy"], "C", "Superficial politeness and deference to authority are classic Forming behaviors. The SM should provide structure and create psychological safety."],
      [27, "Two team members get into a heated personal argument and refuse to work together. What conflict level?", ["A. Level 1 — Problem to Solve","B. Level 2 — Disagreement","C. Level 3 — Contest","D. Level 4 — Crusade"], "C", "Personal attacks and refusal to collaborate = Level 3. 'Winning' is now more important than solving the problem. Active mediation required."],
      [28, "A team that was Performing loses two senior members and gains three juniors. What will likely happen?", ["A. Team continues performing — established processes remain","B. Team may regress to Forming or Storming and need re-norming","C. New members will quickly adapt to the culture","D. Performance dips then automatically recovers"], "B", "Team composition changes reset team dynamics. New members don't know working agreements or norms. The team needs to re-Form and re-Storm before re-Norming."],
      [29, "What is the PRIMARY difference between servant leadership and traditional project management?", ["A. Servant leaders have less authority","B. Servant leaders focus on serving the team's needs to enable performance rather than directing and controlling","C. Servant leaders don't set goals or timelines","D. Servant leaders are only responsible for morale"], "B", "PM-ACP defines servant leadership as enabling team success by removing obstacles, coaching, and fostering self-organization — not commanding work."],
      [30, "A stakeholder approaches a developer directly and asks them to add a feature without going through the PO. What should the developer do?", ["A. Add the feature — stakeholder is a key customer","B. Politely decline and direct the stakeholder to the Product Owner to add to the backlog","C. Add the feature in personal time","D. Escalate to the Scrum Master immediately"], "B", "All scope changes go through the PO who owns the backlog. Direct developer requests bypass prioritization and create scope creep."],
      [31, "The team retrospective produces the same improvement items for 3 sprints with no follow-through. Most effective fix?", ["A. Cancel retrospectives","B. Add retrospective action items to the sprint backlog as actual stories so they get attention alongside features","C. Assign one person to follow up on each item","D. Increase retrospective frequency to twice per sprint"], "B", "Treating improvement actions as first-class backlog items is the most effective technique. When they compete for priority alongside features, they get done."],
      [32, "During a sprint, a developer is blocked waiting for an external API. What should the Scrum Master do?", ["A. Accept it — external dependencies can't be managed","B. Actively work to unblock: escalate with external team, explore if developer can mock the API, find alternative work","C. Remove the story from the sprint","D. Ask the PO to deprioritize"], "B", "Removing impediments — including external dependencies — is a core SM responsibility. Multiple actions simultaneously: escalate AND find a workaround."],
      [33, "What does 'psychological safety' mean in an agile team?", ["A. Physical safety protocols","B. An environment where team members can speak up, take risks, admit mistakes without fear of punishment","C. A policy preventing team members from being fired","D. Confidentiality agreements"], "B", "Amy Edmondson's research. Psychological safety is foundational to retrospectives, experimentation, and self-organization. Without it, agile fails."],
    ]},
    // PRODUCT
    { id: 'q-product', section: 'Domain 3: Product Questions (Q56–Q75)', qs: [
      [56, "Which user story BEST follows INVEST criteria?", ["A. 'Improve system performance'","B. 'As a registered user, I want to reset my password via email, so that I can regain access if I forget credentials'","C. 'The system should be fast and secure'","D. 'Implement all database changes required for the new feature set'"], "B", "B follows the correct format and passes all INVEST checks: Independent, Negotiable, Valuable (solves real problem), Estimable, Small (fits sprint), Testable (clear acceptance criteria possible)."],
      [57, "The PO wants to prioritize using the Kano Model. Which feature type should be prioritized HIGHEST?", ["A. Excitement features — they wow customers","B. Performance features — more is better","C. Basic/Threshold features — their absence causes dissatisfaction regardless of other features","D. All types equally"], "C", "Kano hierarchy: (1) Basic first — table stakes, absence destroys satisfaction. Only after basics are addressed do performance and excitement features add value."],
      [58, "A story needs a spike. Which situation BEST justifies creating one?", ["A. The PO wants a more accurate estimate","B. The team cannot estimate a story because the technology is completely unfamiliar","C. The story is too large for one sprint","D. The acceptance criteria are unclear"], "B", "A spike is specifically for technical uncertainty that prevents estimation. The spike produces knowledge (not software), which then enables proper estimation of the original story."],
      [59, "What is the primary role of acceptance criteria in user stories?", ["A. To estimate story size","B. To define conditions the PO must verify are satisfied before accepting the story as complete","C. To list technical implementation tasks","D. To document requirements for the project file"], "B", "Acceptance criteria answer 'how will we know it's done?' Written from user/business perspective. Form the basis for acceptance testing."],
      [60, "A Product Owner must choose between: Feature A ($5K cost, $20K/month delay cost) vs Feature B ($15K cost, $15K/month delay cost). Using WSJF, which wins?", ["A. Feature A — WSJF score is higher","B. Feature B — WSJF score is higher","C. Feature A — it costs less","D. Feature B — it has higher value"], "A", "WSJF = Cost of Delay ÷ Job Size. Feature A: 20÷5=4.0. Feature B: 15÷15=1.0. Feature A prioritized. WSJF favors small, high-value items."],
      [61, "What is a 'Minimum Viable Product' (MVP)?", ["A. The minimum features required for the product to work","B. The smallest version of a product to test a hypothesis and learn from real customers","C. A prototype with no functionality","D. The backlog after removing nice-to-haves"], "B", "MVP (Eric Ries, Lean Startup) is about learning, not minimalism. Test the riskiest assumption with the smallest investment possible. Goal = validated learning."],
      [62, "The team built exactly what the stakeholder requested but it doesn't solve their business problem. What process failure occurred?", ["A. The team built the wrong feature","B. The PO failed to understand the underlying business need and translated a stated requirement without validating the business value","C. Sprint review should have caught this","D. QA should have caught the business value issue"], "B", "The gap between stated requirements and actual business needs. The 'so that' clause in user stories exists precisely to capture this. The PO's job is to understand WHY, not just WHAT."],
    ]},
    // DELIVERY
    { id: 'q-delivery', section: 'Domain 4: Delivery Questions (Q76–Q100)', qs: [
      [76, "A burndown chart shows a flat line for 3 consecutive days mid-sprint. What does this indicate?", ["A. Team is on track — flat lines are normal","B. The team is blocked or carrying undetected impediments — investigate immediately","C. Burndown chart needs recalibrating","D. Add more stories to maintain momentum"], "B", "Flat burndown = no work moving to done. Signals blockers, unclear acceptance criteria, or rework. This is exactly what the daily standup should surface."],
      [77, "Team completes 38, 34, 42, 40, 36 story points in 5 sprints. Remaining backlog = 180 pts. How many sprints needed?", ["A. Velocity=36, Sprints=5","B. Velocity=38, Sprints≈5 (4.73 rounds up)","C. Velocity=40, Sprints=4.5","D. Velocity=38, Sprints=4"], "B", "Average velocity = (38+34+42+40+36)÷5 = 190÷5 = 38. Sprints = 180÷38 = 4.73 → rounds UP to 5. Always round up for sprint counts."],
      [78, "When would you use a burnup chart over a burndown chart?", ["A. Burndown is always more accurate","B. Use burnup when scope changes are frequent — it shows completed work against total scope, making scope additions visibly clear","C. Burnup for sprints; burndown for releases","D. They show the same information"], "B", "Burnup has two lines — completed work and total scope. Scope additions visibly move the scope line up. Burndown cannot show scope changes clearly."],
      [79, "A team's CFD shows the 'In Testing' band widening over 2 weeks. What does this indicate?", ["A. Team is testing more features — positive","B. Work is accumulating in testing — bottleneck. Team should swarm on testing to clear the queue","C. Development team is too fast","D. WIP limit is too high"], "B", "Widening band in CFD = bottleneck in that stage. Team should swarm (focus all available capacity), pause new development if needed, and investigate root cause."],
      [80, "A project has BAC=$200K, PV=$100K, EV=$80K, AC=$110K. What is CPI?", ["A. 1.1 — under budget","B. 0.73 — over budget, spending $1.37 per $1 of value","C. 0.89 — slightly over budget","D. 1.25 — under budget"], "B", "CPI = EV÷AC = $80K÷$110K = 0.727 ≈ 0.73. Below 1.0 = over budget. For every $1 spent, only $0.73 of value is delivered."],
      [81, "Which of the following BEST describes a 'spike' in agile?", ["A. Sprint focused entirely on technical debt","B. Time-boxed research to answer a specific question and reduce uncertainty — knowledge, not software, is the output","C. Emergency sprint to fix critical bugs","D. Planning session for a new feature"], "B", "A spike is time-boxed (1-4 days), answers a specific question, and produces knowledge as output. The knowledge enables proper estimation of the related story."],
      [82, "In SAFe, what is the primary purpose of PI Planning?", ["A. Estimate all stories in next 12 sprints","B. Align multiple agile teams to shared vision, identify dependencies, and set PI objectives","C. Select which team members work on each feature","D. Create the release backlog"], "B", "PI Planning is SAFe's heartbeat. 2-day event for all ART teams to plan together, align on vision, identify cross-team dependencies, commit to PI objectives."],
      [83, "In Scrum, who has authority to cancel a sprint?", ["A. Scrum Master","B. Development Team by consensus","C. Product Owner","D. Senior management"], "C", "Only the Product Owner can cancel a sprint, and only when the Sprint Goal has become obsolete. Sprint cancellations are rare. Management cannot cancel sprints."],
      [84, "A release burnup chart shows the scope line rising faster than the completed work line for 3 sprints. What should the PO do?", ["A. Velocity is good — scope increases show product growth","B. Scope creep is occurring — evaluate: trim scope, add capacity, or accept a later release date","C. Burnup chart is measuring incorrectly","D. This is normal — scope always grows in agile"], "B", "Rising scope line outpacing completed work = the release date will slip or scope must be cut. PO has 3 levers: trim scope, add capacity, or push the release date."],
    ]},
    // FRAMEWORKS
    { id: 'q-frameworks', section: 'Framework Comparison Questions (Q101–Q112)', qs: [
      [101, "A team handles unpredictable daily support requests alongside feature work. Which framework is BEST suited?", ["A. Scrum — sprint structure creates predictable cycles","B. Kanban — continuous flow and WIP limits handle unpredictable, priority-changing work better","C. SAFe — PI planning creates stability","D. XP — technical practices ensure quality"], "B", "Kanban's strength is continuous, unpredictable work. Fixed-sprint Scrum forces urgent requests to wait for next sprint — problematic for support teams."],
      [102, "8 development teams must coordinate on a single large product. Which approach is MOST appropriate?", ["A. Run 8 Scrum teams independently","B. Use a shared Kanban board","C. SAFe or LeSS — specifically designed for multi-team coordination","D. DSDM — governance supports large teams"], "C", "SAFe and LeSS are specifically designed for multi-team coordination. Independent Scrum teams without a coordination framework create dependency chaos."],
      [103, "Which XP practice most directly addresses the risk of a developer leaving and taking critical knowledge?", ["A. Test-Driven Development","B. Pair Programming and Collective Code Ownership","C. Continuous Integration","D. On-Site Customer"], "B", "Pair programming shares knowledge in real-time. Collective code ownership ensures any developer can work in any part of the codebase. Both eliminate knowledge silos."],
      [104, "A DSDM project is behind schedule. The sponsor wants to extend the deadline. What is the DSDM response?", ["A. Extend the deadline — full scope must be delivered","B. Reduce scope by dropping 'Could Have' features to meet the fixed deadline","C. Add more team members","D. Switch to Scrum for more flexibility"], "B", "DSDM's core principle: fix time and cost, vary scope. Deadlines are sacrosanct. MoSCoW prioritization enables scope reduction: drop Could Have → Should Have if necessary."],
      [105, "What is the PRIMARY benefit of TDD compared to writing tests after coding?", ["A. TDD produces more tests","B. TDD produces better-designed code — writing tests first forces clarity on what the code needs to do","C. TDD is faster","D. TDD satisfies regulatory requirements"], "B", "The design benefit is as important as the quality benefit. Writing tests first forces the developer to think from the consumer's perspective, leading to cleaner APIs and simpler designs."],
    ]},
  ];

  let html = `
  <div class="section-hero">
    <div class="hero-eyebrow">Section 8</div>
    <div class="hero-title">112+ Sample Exam Questions</div>
    <div class="hero-subtitle">Scenario-based questions across all 4 domains + framework comparisons. Click a question to reveal options, then click your answer to check it.</div>
    <div class="hero-stats">
      <div class="hero-stat"><span class="hero-stat-val">112</span><div class="hero-stat-label">Questions</div></div>
      <div class="hero-stat"><span class="hero-stat-val">5</span><div class="hero-stat-label">Categories</div></div>
      <div class="hero-stat"><span class="hero-stat-val">Interactive</span><div class="hero-stat-label">Answers</div></div>
    </div>
  </div>
  `;

  qData.forEach(group => {
    html += `<h2 class="content-h2" id="${group.id}">${group.section}</h2>`;
    group.qs.forEach(([num, q, opts, ans, exp]) => {
      html += qaBlock(num, q, opts, ans, exp);
    });
  });
  return html;
}

  <p class="content-p">The IMT-PM PMI Authorized Training Partner course is structured into 4 domain lessons matching the ECO exactly. These learning objectives are the official PMI-sanctioned outcomes for each ECO task — they define precisely what the exam tests.</p>

  <h3 class="content-h3" style="color:#3b82f6">Domain 1: Mindset (28%) — Learning Objectives</h3>
  <table class="content-table"><thead><tr><th>ECO Task</th><th>Key Learning Objectives (What the Exam Tests)</th></tr></thead><tbody><tr><td><strong>Experiment Early</strong></td><td>Apply early experimentation principles; build product increments; conduct validation activities; make decisions based on results</td></tr><tr><td><strong>Embrace the Agile Mindset</strong></td><td>Express the 4 Agile Manifesto values and how they shape 12 principles; differentiate agile methodologies; apply Cynefin framework; evaluate agile suitability tools; determine suitable hybrid approaches</td></tr><tr><td><strong>Promote Collaborative Team Environment</strong></td><td>Establish team vision using agile vision approaches; identify 5 Tuckman stages; conduct effective retrospectives; apply motivational theory; define agile scaling and inter-team coordination approaches</td></tr><tr><td><strong>Build Transparency</strong></td><td>Apply lean "make process explicit" principle; explain how each agile methodology uses shorter feedback loops; differentiate communication mechanisms for co-located vs distributed teams</td></tr><tr><td><strong>Foster Psychological Safety</strong></td><td>Define foundational principles of psychological safety; recognise how belonging and learning mindset support psychological safety; understand the psychological safety continuum — especially Contributor Safety and Challenger Safety</td></tr><tr><td><strong>Shorten Feedback Loops</strong></td><td>Understand the customer's role in development; evaluate what constitutes value (economic and non-economic); apply Design Thinking and Lean Startup principles</td></tr><tr><td><strong>Embrace Change</strong></td><td>Define growth mindset principles; explain the Agile Manifesto "responding to change" value; describe agile team dynamics and cross-functional team structures</td></tr></tbody></table>

  <h3 class="content-h3" style="color:#8b5cf6">Domain 2: Leadership (25%) — Learning Objectives</h3>
  <table class="content-table"><thead><tr><th>ECO Task</th><th>Key Learning Objectives (What the Exam Tests)</th></tr></thead><tbody><tr><td><strong>Empower Teams</strong></td><td>Recall transparency concepts; identify product retrospective checklist elements; apply Lyssa Adkins coaching graphs and phases; understand collective empowerment; distinguish training vs coaching vs mentoring; apply emotional intelligence (empathy, social skills); recognise non-verbal cues; use team self-assessment tools</td></tr><tr><td><strong>Facilitate Problem Resolution</strong></td><td>Apply quality management tools for problem-resolution strategies; use Cynefin framework to classify situations; differentiate agile methodologies in problem contexts</td></tr><tr><td><strong>Promote Knowledge Sharing</strong></td><td>Create knowledge-sharing environments; leverage organisational assets; apply time management techniques for knowledge sharing</td></tr><tr><td><strong>Promote Agile Mindset Principles</strong></td><td>Create awareness of agile mindset; analyse methods promoting continuous improvement culture; communicate compelling product vision to stakeholders</td></tr><tr><td><strong>Promote Shared Vision & Purpose</strong></td><td>Promote shared vision among team and stakeholders; align team vision with organisational goals; communicate and reinforce organisational vision</td></tr><tr><td><strong>Facilitate Conflict Management</strong></td><td>Analyse team conflict; facilitate conflict management; promote collaborative conflict resolution for satisfactory outcomes</td></tr></tbody></table>

  <h3 class="content-h3" style="color:#10b981">Domain 3: Product (19%) — Learning Objectives</h3>
  <table class="content-table"><thead><tr><th>ECO Task</th><th>Key Learning Objectives (What the Exam Tests)</th></tr></thead><tbody><tr><td><strong>Refine Product Backlog</strong></td><td>Discuss backlog refinement and clarification; evaluate effectiveness of prioritisation approaches; demonstrate backlog item decomposition; compare techniques for collectively sizing work</td></tr><tr><td><strong>Manage Increments</strong></td><td>Understand business value and its role in prioritisation; recognise increment goals and their relation to release and sprint planning; understand increments of value; explain measuring value delivery</td></tr><tr><td><strong>Visualise Work</strong></td><td>List key concepts of various work visualisation techniques (Kanban boards, task boards, burndown charts, CFD, story maps)</td></tr><tr><td><strong>Manage Value Delivery</strong></td><td>Define success criteria components; apply value optimisation principles for product increments; consider security, privacy, regulatory, and compliance as value components</td></tr></tbody></table>

  <h3 class="content-h3" style="color:#f59e0b">Domain 4: Delivery (28%) — Learning Objectives</h3>
  <table class="content-table"><thead><tr><th>ECO Task</th><th>Key Learning Objectives (What the Exam Tests)</th></tr></thead><tbody><tr><td><strong>Seek Early Feedback</strong></td><td>Apply critical thinking to tailor customer satisfaction evaluation approaches; apply stakeholder feedback methodologies; evaluate effectiveness of various feedback collection and integration techniques</td></tr><tr><td><strong>Manage Agile Metrics</strong></td><td>Analyse agile metrics selection criteria; apply communication strategies for disseminating metrics; evaluate metric effectiveness for project performance and stakeholder needs; assess insights from metrics for decision-making</td></tr><tr><td><strong>Manage Impediments & Risks</strong></td><td>Evaluate risks and impediments proactively; compare insight sources for collaborative decision-making; interpret risk information for mitigation prioritisation; establish monitoring and control systems; identify recurring risks</td></tr><tr><td><strong>Recognise & Eliminate Waste</strong></td><td>Analyse end-to-end value flow to identify waste; apply metrics, tools, and feedback loops to identify waste; evaluate waste reduction impact on goals; design iterative waste reduction processes</td></tr><tr><td><strong>Perform Continuous Improvements</strong></td><td>Collect and analyse metrics for improvement areas; implement iterative improvements; evaluate effectiveness of process improvements</td></tr><tr><td><strong>Actively Engage Customers</strong></td><td>Analyse customer requirements and preferences; measure iteration deliverables against acceptance criteria; develop open communication and shared decision-making between customers and team</td></tr><tr><td><strong>Optimise Flow</strong></td><td>Apply WIP limits at all levels; identify methods for shielding team from interruptions; explain cycle time, lead time, throughput, and WIP limits for assessing and improving flow</td></tr></tbody></table>

  
  <h2 class="content-h2" id="imt-glossary-extra">Additional Glossary Terms (IMT-PM — Extended Set)</h2>
  <p class="content-p">These terms appear in the complete IMT-PM glossary and are not yet covered in the main A–Z Glossary section. Many relate to predictive/hybrid project management concepts that also appear on the PMI-ACP exam in comparative questions.</p>
  <table class="content-table"><thead><tr><th>Term</th><th>Definition</th><th>Exam Relevance</th></tr></thead><tbody><tr><td>Activity List</td><td>A documented tabulation of schedule activities with description, identifier, and scope of work detail.</td><td>Used in predictive contexts; appears in hybrid approach questions comparing predictive planning artefacts to agile backlogs.</td></tr><tr><td>Actual Cost (AC)</td><td>The realised cost incurred for the work performed on an activity during a specific time period.</td><td>EVM formula input. AC is what was actually spent. Used in CV = EV - AC and CPI = EV/AC.</td></tr><tr><td>Ambiguity</td><td>A state of being unclear, having difficulty identifying the cause of events, or having multiple options.</td><td>VUCA concept. Agile is explicitly designed for ambiguous environments. Cynefin Complex domain = high ambiguity.</td></tr><tr><td>Analogous Estimating</td><td>Estimating duration or cost using historical data from a similar activity or project.</td><td>Agile uses relative estimation (story points) over analogous; but analogous appears in hybrid/predictive comparison questions.</td></tr><tr><td>Assumption Log</td><td>A project document used to record all assumptions and constraints throughout the project.</td><td>Risk artefact. Agile teams surface assumptions via hypothesis testing and retrospectives rather than a formal log.</td></tr><tr><td>Benefits Management Plan</td><td>Defines processes for creating, maximising, and sustaining benefits from a project or program.</td><td>Value management concept — links to Domain 3 (Manage Value Delivery) and the idea of measuring business outcomes.</td></tr><tr><td>Business Case</td><td>A value proposition for a proposed project including financial and nonfinancial benefits.</td><td>Lean Startup Canvas is the agile equivalent. Business case appears in questions about justifying agile adoption to sponsors.</td></tr><tr><td>Business Requirement Documents (BRD)</td><td>Listing of all requirements for a specific project.</td><td>Predictive artefact. Agile replaces BRDs with a Product Backlog of user stories. Appears in agile vs predictive comparison questions.</td></tr><tr><td>Business Value</td><td>The net quantifiable benefit derived from a business endeavour — tangible or intangible.</td><td>Central to Domain 3. Business value drives prioritisation. Not just revenue — includes risk reduction, compliance, satisfaction, and brand.</td></tr><tr><td>Closing Process Group</td><td>The processes performed to formally complete or close a project, phase, or contract.</td><td>Agile equivalent: Sprint Review (end of sprint) and Release Retrospective (end of release). Not a big-bang close.</td></tr><tr><td>Communications Management Plan</td><td>Describes how, when, and by whom information will be administered and disseminated.</td><td>Agile favours direct communication (information radiators, daily standup) over formal communication plans.</td></tr><tr><td>Complexity</td><td>Difficult to manage due to human behaviour, system behaviour, and ambiguity.</td><td>Cynefin framework classifies complex vs complicated vs chaotic vs clear. Agile is designed for the complex domain.</td></tr><tr><td>Confirmation Bias</td><td>A cognitive bias that confirms preexisting beliefs or hypotheses.</td><td>Appears in Domain 1 (Embrace Agile Mindset). Leaders must recognise and mitigate confirmation bias in decision-making.</td></tr><tr><td>Constraint</td><td>A limiting factor affecting project execution. The triple constraint: scope, time, cost.</td><td>DSDM fixes time and cost; flexes scope (MoSCoW). Understanding constraints helps select the right adaptive approach.</td></tr><tr><td>Contingency</td><td>An event that could affect project execution, accounted for with a reserve.</td><td>Risk management concept. Agile manages contingency through sprint buffer, risk-adjusted backlog, and timeboxing.</td></tr><tr><td>Contingency Reserve</td><td>Time or money allocated for known risks with active response strategies.</td><td>Agile equivalent: slack in iteration, spike stories, or explicit risk items in the backlog.</td></tr><tr><td>Cost Baseline</td><td>The approved time-phased budget, excluding management reserves.</td><td>EVM baseline. In agile, the release budget often acts as the cost baseline for tracking CPI across sprints.</td></tr><tr><td>Cost-Benefit Analysis</td><td>A financial analysis method to determine project benefits versus costs.</td><td>Used to justify agile adoption, prioritise epics, and evaluate the ROI of potential features.</td></tr><tr><td>Crashing</td><td>Shortening schedule by adding resources for least incremental cost.</td><td>Predictive technique. Agile alternative: reduce scope (MoSCoW), not add resources. Adding people to a late sprint = Brooks' Law.</td></tr><tr><td>Daily Coordination Meeting</td><td>Alternate name for Daily Scrum / Daily Standup. A brief daily collaboration on progress, plans, and obstacles.</td><td>Different frameworks use different names: Daily Scrum (Scrum), Daily Standup, Daily Coordination Meeting. Same purpose.</td></tr><tr><td>Dashboard</td><td>A set of charts and graphs showing progress or performance against important project measures.</td><td>Information radiator at the management level. Agile dashboards include velocity charts, CFDs, burndowns, and quality metrics.</td></tr><tr><td>Decision Tree Analysis</td><td>A diagramming and calculation method for evaluating chains of multiple options under uncertainty.</td><td>Risk management tool. Used to calculate Expected Monetary Value (EMV) at decision branch points.</td></tr><tr><td>Decomposition</td><td>Dividing project scope and deliverables into smaller, manageable parts.</td><td>In agile: Epics → Features → User Stories → Tasks. Progressive decomposition aligns with just-in-time planning.</td></tr><tr><td>Earned Value (EV)</td><td>The measure of work performed expressed in terms of budget authorised for that work. EV = % Complete × BAC.</td><td>Core EVM metric. Foundation for all CV, SV, CPI, SPI calculations.</td></tr><tr><td>Earned Value Analysis (EVA)</td><td>Uses scope, schedule, and cost measures to determine cost and schedule performance.</td><td>PMI-ACP tests EVM in agile contexts: tracking EVM per sprint, using velocity alongside CPI.</td></tr><tr><td>Enterprise Environmental Factors (EEF)</td><td>Conditions not under the team's immediate control that influence the project.</td><td>Agile must adapt to EEFs: organisational culture, regulatory requirements, market conditions, tool availability.</td></tr><tr><td>Expected Monetary Value (EMV)</td><td>The estimated monetary value of an outcome: EMV = Probability × Impact.</td><td>Risk quantification. Used in decision tree analysis. Appears in risk management questions in Domain 4.</td></tr><tr><td>Explicit Knowledge</td><td>Knowledge that can be codified using symbols, words, numbers, and pictures.</td><td>Contrast with Tacit Knowledge. Wikis, documentation, and process guides are explicit. Agile prefers face-to-face for tacit.</td></tr><tr><td>Fast Tracking</td><td>Performing activities normally done in sequence in parallel to compress the schedule.</td><td>Predictive technique. Agile equivalent: parallel feature development by multiple teams, continuous delivery pipeline.</td></tr><tr><td>Flowchart</td><td>A diagram depicting inputs, process actions, and outputs of one or more processes within a system.</td><td>Value stream mapping is the agile/lean version of flowchart. Both help visualise and improve processes.</td></tr><tr><td>Forecast</td><td>An estimate or prediction of project future conditions based on current knowledge.</td><td>Agile forecasting: release burnup, Monte Carlo simulation, velocity-based sprint forecasting.</td></tr><tr><td>Functional Requirement</td><td>A specific behaviour that a product or service should perform.</td><td>User stories capture functional requirements. Non-functional requirements (NFRs) are captured in the Definition of Done.</td></tr><tr><td>Functional Specification</td><td>A specific function a system is required to perform, typically in a formal document.</td><td>Predictive artefact replaced by user stories and acceptance criteria in agile. Appears in agile vs predictive comparison.</td></tr><tr><td>Gantt Chart</td><td>A bar chart of schedule information with activities on vertical axis and dates on horizontal axis.</td><td>Predictive planning tool. Agile uses roadmaps and release plans instead. Appears in hybrid approach questions.</td></tr><tr><td>Influence Diagram</td><td>A graphical representation of causal influences, time ordering, and relationships among variables.</td><td>Systems thinking tool. Useful for understanding complex interdependencies in Domain 1 (Embrace Agile Mindset).</td></tr><tr><td>Issue Log</td><td>A project document where information about issues is recorded and monitored.</td><td>Agile equivalent: impediment backlog (managed by Scrum Master). Issues = impediments to be removed.</td></tr><tr><td>Mandatory Dependency</td><td>A relationship contractually required or inherent in the nature of the work.</td><td>Agile manages dependencies through Sprint Planning, Program Board (SAFe), and Scrum of Scrums coordination.</td></tr><tr><td>Metric</td><td>A description of a project or product attribute and how to measure it.</td><td>Domain 4 Task 2: Manage Agile Metrics. Metrics must be purposeful — avoid vanity metrics. Velocity, cycle time, lead time, NPS.</td></tr><tr><td>Milestone</td><td>A significant point or event in a project, program, or portfolio.</td><td>Agile milestones: end of sprint, release, PI. Milestones in agile mark delivery of value, not just completion of tasks.</td></tr><tr><td>Multipoint Estimating</td><td>Estimating using optimistic, pessimistic, and most likely estimates. PERT = (O + 4M + P) / 6.</td><td>PERT formula is tested on PMI-ACP. Used for individual story estimation when three-point estimates are available.</td></tr><tr><td>Organisational Change Management</td><td>A structured approach for transitioning individuals and organisations from current to future state.</td><td>Domain 2 (Leadership) and Domain 1 (Mindset). Agile transformation requires change management — it's not just process change.</td></tr><tr><td>Phase Gate</td><td>A review at the end of a phase — continue, modify, or end the project.</td><td>Agile equivalent: Sprint Review acts as a soft phase gate every sprint. Release decisions are phase gate decisions.</td></tr><tr><td>Plan-Driven / Predictive Approach</td><td>Utilises a work plan managed throughout the life cycle. Bulk planning done upfront.</td><td>Fundamental contrast to adaptive approach. PMI-ACP exam includes questions on when to use predictive vs agile vs hybrid.</td></tr><tr><td>Prioritisation Schema</td><td>Methods used to prioritise portfolio, program, or project components.</td><td>Includes MoSCoW, Kano, WSJF, Value/Risk matrix, and story mapping. Domain 3 core concept.</td></tr><tr><td>Probabilistic Estimating</td><td>Developing a range of estimates with associated probabilities. Monte Carlo simulation.</td><td>Agile uses velocity distribution for probabilistic release forecasting. More rigorous than single-point estimates.</td></tr><tr><td>Probability and Impact Matrix</td><td>A grid mapping probability and impact of each risk.</td><td>Risk management tool. In agile, risks are often added directly to the risk-adjusted backlog rather than a formal matrix.</td></tr><tr><td>Project Lead</td><td>Helps the project team achieve objectives by orchestrating work.</td><td>In agile organisations, the Project Lead role is often replaced by Scrum Master + Product Owner combination.</td></tr><tr><td>Project Manager</td><td>The person assigned by the performing organisation to lead the team to achieve project objectives.</td><td>In Scrum, there is no PM role. In hybrid or scaling contexts, a PM may coordinate across teams while SM handles team-level.</td></tr><tr><td>Project Phase</td><td>A collection of logically related activities culminating in completion of one or more deliverables.</td><td>Agile phases are iterations/sprints — much shorter than traditional phases. Each sprint is a mini-phase delivering value.</td></tr><tr><td>Project Vision Statement</td><td>A concise, high-level description stating the project purpose and inspiring the team.</td><td>Domain 3 artefact. The Vision Statement is the outermost boundary defining what is part of the project. PO owns it.</td></tr><tr><td>Quality Metrics</td><td>A description of a project or product attribute and how to measure it.</td><td>In agile: defect rate, test coverage, escaped defects, cycle time, customer satisfaction. Part of Definition of Done.</td></tr><tr><td>Quality Report</td><td>Includes quality management issues, corrective action recommendations, and quality control findings.</td><td>Agile equivalent: retrospective actions and technical debt backlog. Quality is built in, not inspected in.</td></tr><tr><td>Regression Analysis</td><td>Examines input variables in relation to output results to develop mathematical/statistical relationships.</td><td>Advanced metrics. Used in predictive analytics to forecast velocity trends or estimate project completion probabilities.</td></tr><tr><td>Release</td><td>One or more components intended to be put into production at the same time.</td><td>In Scrum, the PO decides when to release. Every sprint produces a potentially releasable increment — but release is a business decision.</td></tr><tr><td>Release Planning</td><td>Identifying a high-level plan for releasing or transitioning a product increment.</td><td>Domain 3 artefact. Release plan sits between Product Roadmap and Sprint Backlog. Updated every few sprints as scope/velocity clarifies.</td></tr><tr><td>Requirement</td><td>A condition or capability necessary to satisfy a business need.</td><td>In agile: captured as User Stories with Acceptance Criteria. Emerges progressively via backlog refinement.</td></tr><tr><td>Roadmap</td><td>A high-level timeline depicting milestones, significant events, reviews, and decision points.</td><td>Product Roadmap = high-level functional areas across multiple releases. Different from Release Plan (one release) or Sprint Plan.</td></tr><tr><td>Schedule Baseline</td><td>The approved schedule model used as basis for comparison to actual results.</td><td>Agile uses sprint burndown and release burnup in place of formal schedule baseline tracking.</td></tr><tr><td>Schedule Compression</td><td>Shortening schedule without reducing scope. Techniques: crashing and fast-tracking.</td><td>Predictive technique. Agile equivalent: reduce scope (MoSCoW), not compress schedule. Sprint dates are timeboxed.</td></tr><tr><td>Scope Creep</td><td>Uncontrolled expansion of scope without adjustments to time, cost, and resources.</td><td>Agile explicitly manages this through Product Backlog ownership (PO), Sprint Goal protection (SM), and DoR quality gate.</td></tr><tr><td>Scope Management Plan</td><td>Describes how scope will be defined, developed, monitored, controlled, and validated.</td><td>In agile: the Product Backlog + DoD + DoR collectively serve as the agile scope management mechanism.</td></tr><tr><td>Siloed Organisation</td><td>Structured so it only contributes a subset of aspects required for delivering value.</td><td>Domain 1 and 2. Agile breaks silos through cross-functional teams, shared backlogs, and collaborative planning.</td></tr><tr><td>Sponsor</td><td>Provides resources and support and is accountable for enabling project success.</td><td>In agile: the Sponsor (or Executive Stakeholder) sets the Product Vision and secures funding. Critical for agile transformation.</td></tr><tr><td>Story Map</td><td>A visual model of all desired features and functionality giving the team a holistic view of what they are building and why.</td><td>Domain 3 Tool. Organises user stories by user journey (horizontal) and priority (vertical). Reveals gaps in the backlog.</td></tr><tr><td>Threshold</td><td>A predetermined value representing a limit requiring action if reached.</td><td>In agile: WIP limits in Kanban are thresholds. Velocity thresholds trigger retrospective action. Risk thresholds trigger escalation.</td></tr><tr><td>Throughput Chart</td><td>A diagram showing accepted deliverables over time.</td><td>Kanban flow metric. Shows how many items completed per time period. Used alongside cycle time for flow prediction.</td></tr><tr><td>Uncertainty</td><td>Lack of understanding of issues, events, path to follow, or solutions to pursue.</td><td>VUCA concept. Agile is designed for uncertain environments — short iterations, inspect-and-adapt cycles reduce uncertainty over time.</td></tr><tr><td>Variance Analysis</td><td>Determining the cause and degree of difference between baseline and actual performance.</td><td>EVM application. CV = EV - AC (cost variance). SV = EV - PV (schedule variance). Agile uses these for sprint-level and release-level tracking.</td></tr></tbody></table>
  
  <h3 class="content-h3" id="imt-safe-metrics">SAFe Metrics — Extended Glossary (IMT-PM)</h3>
  <p class="content-p">These SAFe-specific metrics appear in the IMT-PM glossary and are testable in Domain 4 questions about agile metrics at scale.</p>
  <table class="content-table"><thead><tr><th>SAFe Metric / Term</th><th>Definition</th><th>When It Appears on Exam</th></tr></thead><tbody><tr><td>Epic Burnup Chart</td><td>Tracks progress toward epic completion: initial estimate, work completed, and cumulative completed.</td><td>Epic-level tracking in Portfolio Kanban. Appears in scaling/SAFe scenario questions about portfolio metrics.</td></tr><tr><td>Epic Progress Measure</td><td>At-a-glance view of status of all epics in a portfolio: Epic name, progress %, current vs initial estimate story points.</td><td>Portfolio-level visibility. Used in Lean Portfolio Management (LPM) self-assessments.</td></tr><tr><td>Enterprise Scorecard</td><td>Four perspectives measuring portfolio performance: Efficiency, Value Delivery, Quality, and Agility.</td><td>Balanced scorecard adapted for SAFe. Appears in questions about portfolio-level performance measurement.</td></tr><tr><td>LPM Self-Assessment</td><td>Structured periodic self-assessment to measure and improve portfolio processes and Lean Portfolio Management maturity.</td><td>SAFe built-in improvement mechanism at portfolio level. Similar to team retrospective but for LPM practices.</td></tr><tr><td>Solution Kanban Board</td><td>Ensures Capabilities and Enablers are reasoned, analysed, and prioritised before PI boundary with acceptance criteria.</td><td>Large Solution level. Appears in questions about scaling agile beyond a single ART to a Solution Train.</td></tr><tr><td>Solution Predictability</td><td>Aggregation of individual ART predictability measures to assess overall Solution Train predictability.</td><td>Large Solution metric. PI Performance = planned business value vs delivered business value across all ARTs.</td></tr><tr><td>Program Kanban</td><td>Ensures Features are reasoned, analysed, and prioritised before PI boundary with acceptance criteria.</td><td>ART level equivalent of Portfolio Kanban. All features enter Program Kanban before PI Planning.</td></tr><tr><td>Program Predictability</td><td>Aggregation of Team PI Performance Reports to assess ART predictability: planned vs actual business value.</td><td>Key SAFe metric. Target: 80%+ predictability. Measured at end of each PI during Inspect and Adapt.</td></tr><tr><td>Program Performance</td><td>Aggregation of team metrics at end of PI: functionality (velocity, features completed) and quality (defects, test coverage).</td><td>Holistic ART health measure at end of PI. Feeds into Inspect and Adapt workshop root cause analysis.</td></tr><tr><td>PI Burndown Chart</td><td>Shows progress toward PI timebox: work planned vs work accepted. Indicates if ART is on track to meet PI goals.</td><td>ART-level progress tracking. Similar to sprint burndown but spans the full PI (8-12 weeks).</td></tr><tr><td>ART Self-Assessment</td><td>Structured periodic self-assessment to improve program processes across team collaboration, delivery cadence, and value stream alignment.</td><td>ART-level retrospective mechanism. Distinct from team retrospective — focuses on cross-team coordination and delivery.</td></tr><tr><td>CD Pipeline Efficiency</td><td>Measures efficiency of continuous deployment steps: touch time and wait time across analysis, backlog, build, validate, deploy, release.</td><td>DevOps/flow metric. Identifies where the CI/CD pipeline has bottlenecks. Lean waste identification at technical level.</td></tr><tr><td>Deployments and Releases</td><td>Ratio of deployment to production frequency vs product release frequency.</td><td>Continuous delivery metric. High deployment frequency with low release frequency = feature toggling / dark launches.</td></tr><tr><td>Innovation Indicators</td><td>Hypothesis measures of MMF (Minimum Marketable Feature) and MVP business outcomes based on innovation accounting.</td><td>Lean Startup in SAFe context. Measures whether hypotheses about innovation are being validated with real data.</td></tr><tr><td>Hypotheses Tested</td><td>Number of successful vs unsuccessful hypothesis tests. Goal: increase number, frequency, and success rate over time.</td><td>Lean Startup metric. Reflects a culture of experimentation. High test rate = healthy innovation culture.</td></tr><tr><td>Computer-Aided Software Testing (CAST)</td><td>Uses software tools to automate the testing process of software applications.</td><td>Technical quality practice. Automated test coverage supports continuous integration and zero-defect mindset.</td></tr></tbody></table>

  `;
}

function renderGlossary() {
  return `
  <div class="section-hero">
    <div class="hero-eyebrow">IMT-PM Free Resource</div>
    <div class="hero-title">Glossary of Agile Terms</div>
    <div class="hero-subtitle">150+ terms sourced from IMT-PM's official PMI-ACP free resources, organised alphabetically with category tags and domain relevance for targeted exam study.</div>
    <div class="hero-stats">
